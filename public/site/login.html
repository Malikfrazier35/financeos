<head>
<script>((d)=>{const t=localStorage.getItem("cf-theme");if(t)d.dataset.theme=t})(document.documentElement)</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in · Castford</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --d:'Instrument Sans',-apple-system,sans-serif;
  --b:'DM Sans',-apple-system,sans-serif;
  --m:'Geist Mono','SF Mono',monospace;
  --ease:cubic-bezier(0.4,0,0.2,1);
  --max:1280px;
}
[data-theme="day"]{
  --bg:#FFFFFF; --canvas:#FAFAF9; --s1:#FFFFFF; --s2:#F5F5F4;
  --ink:#0B0E1A; --t1:#1E2038; --t2:#4A4F6E; --t3:#6E738F; --t4:#9AA0B5;
  --bdr:rgba(91,127,204,0.10); --bdr-strong:rgba(91,127,204,0.18);
  --prime:#5B7FCC; --prime-ink:#1A3F7A; --prime-bg:rgba(91,127,204,0.06);
  --gold:#C4884A; --gold-bg:rgba(196,136,74,0.08);
  --good:#1F4937; --bad:#993C1D;
  --nav-bg:rgba(255,255,255,0.92);
  --logo-main:#1A3F7A; --logo-inner:#1A3F7A; --logo-core:#1A3F7A;
  --logo-outer-o:0.08; --logo-mid-o:0.15; --logo-inner-fill:0.05;
  --shadow-card:0 1px 2px rgba(0,0,0,0.02),0 4px 14px rgba(91,127,204,0.05);
  --shadow-card-h:0 2px 4px rgba(0,0,0,0.03),0 8px 24px rgba(91,127,204,0.10);
  --toggle-bg:#F5F5F4;
}
[data-theme="night"]{
  --bg:#0A0F1F; --canvas:#0F1628; --s1:#161D30; --s2:#1F2740;
  --ink:#E8E6F0; --t1:#C4C0D8; --t2:#8A86A8; --t3:#5E5A78; --t4:#454059;
  --bdr:rgba(123,158,224,0.10); --bdr-strong:rgba(123,158,224,0.18);
  --prime:#7B9EE0; --prime-ink:#9BB8EC; --prime-bg:rgba(123,158,224,0.08);
  --gold:#D4A574; --gold-bg:rgba(212,165,116,0.08);
  --good:#4ADE80; --bad:#F87171;
  --nav-bg:rgba(10,15,31,0.92);
  --logo-main:#7B9EE0; --logo-inner:#9BB8EC; --logo-core:#DDD8FF;
  --logo-outer-o:0.10; --logo-mid-o:0.18; --logo-inner-fill:0.06;
  --shadow-card:0 1px 2px rgba(0,0,0,0.3),0 4px 16px rgba(0,0,0,0.2);
  --shadow-card-h:0 2px 4px rgba(0,0,0,0.4),0 8px 28px rgba(0,0,0,0.3);
  --toggle-bg:#1F2740;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:var(--b);background:var(--canvas);color:var(--ink);
  -webkit-font-smoothing:antialiased;line-height:1.6;min-height:100vh;
  transition:background .4s var(--ease),color .4s var(--ease);
  display:flex;flex-direction:column;
}
a{color:inherit;text-decoration:none}

/* ─── Topbar ─── */
nav{
  position:sticky;top:0;z-index:100;background:var(--nav-bg);
  backdrop-filter:blur(20px) saturate(1.3); -webkit-backdrop-filter:blur(20px) saturate(1.3);
  border-bottom:0.5px solid var(--bdr);
}
.ni{max-width:var(--max);margin:0 auto;padding:0 32px;height:64px;
  display:flex;align-items:center;justify-content:space-between;gap:24px}
.nl{display:flex;align-items:center;gap:10px}
.nl svg{width:22px;height:22px}
.nl-name{font-family:var(--d);font-size:15px;font-weight:700;letter-spacing:-0.4px;color:var(--ink)}
.nr{display:flex;align-items:center;gap:14px}
.toggle{width:36px;height:20px;border-radius:10px;background:var(--toggle-bg);
  border:0.5px solid var(--bdr);cursor:pointer;position:relative;transition:background .3s}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;
  border-radius:7px;background:var(--prime);transition:transform .3s var(--ease)}
[data-theme="night"] .toggle::after{transform:translateX(16px)}

/* ─── Main ─── */
main{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px;position:relative;z-index:1}
.shell{width:100%;max-width:440px}

/* Eyebrow */
.eyebrow{
  font-size:10px;font-family:var(--m);font-weight:500;letter-spacing:2px;
  color:var(--gold);text-transform:uppercase;margin-bottom:14px;
}

/* Hero (smaller than /home — this is a card label not a page banner) */
.hero h1{
  font-family:var(--d);font-size:36px;font-weight:800;
  letter-spacing:-1.2px;line-height:1.05;color:var(--ink);margin-bottom:10px;
}
.hero h1 em{font-style:normal;color:var(--prime-ink);position:relative;display:inline-block}
.hero h1 em::after{
  content:'';position:absolute;bottom:-2px;left:0;right:0;height:2.5px;
  background:var(--prime-ink);animation:ul .7s var(--ease) .8s both;
}
[data-theme="night"] .hero h1 em{color:var(--prime)}
[data-theme="night"] .hero h1 em::after{background:var(--prime)}
@keyframes ul{from{transform:scaleX(0);transform-origin:left}to{transform:scaleX(1);transform-origin:left}}
.hero p{font-size:14.5px;color:var(--t2);line-height:1.6;margin-bottom:28px}

/* Card */
.card{
  background:var(--s1);border:0.5px solid var(--bdr);border-radius:10px;
  padding:36px 32px;box-shadow:var(--shadow-card);
  animation:cardIn .5s var(--ease) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* OAuth buttons */
.oauth-row{display:flex;flex-direction:column;gap:10px;margin-bottom:8px}
.oauth-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:11px 16px;
  font-family:var(--b);font-size:14px;font-weight:500;
  background:var(--s1);color:var(--ink);
  border:0.5px solid var(--bdr);border-radius:8px;
  cursor:pointer;transition:all .18s var(--ease);
}
.oauth-btn:hover{border-color:var(--bdr-strong);background:var(--s2);transform:translateY(-1px)}
.oauth-btn:active{transform:translateY(0)}
.oauth-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.oauth-btn svg{width:16px;height:16px;flex-shrink:0}
.oauth-btn .spinner{
  width:14px;height:14px;border:2px solid var(--bdr);
  border-top-color:var(--prime);border-radius:50%;
  animation:spin .6s linear infinite;display:none;
}
.oauth-btn.loading .spinner{display:inline-block}
.oauth-btn.loading svg{display:none}
.oauth-btn.loading .btn-label{opacity:0.6}
@keyframes spin{to{transform:rotate(360deg)}}

/* Divider */
.divider{
  display:flex;align-items:center;gap:12px;margin:18px 0;
  font-family:var(--m);font-size:9.5px;letter-spacing:1.5px;
  color:var(--t4);text-transform:uppercase;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--bdr)}

/* Form */
.field{margin-bottom:14px}
.field label{
  display:block;font-family:var(--m);font-size:9.5px;font-weight:500;
  letter-spacing:1.5px;color:var(--t3);text-transform:uppercase;margin-bottom:6px;
}
.field-wrap{position:relative}
.field input{
  width:100%;padding:11px 14px;
  font-family:var(--b);font-size:14px;color:var(--ink);
  background:var(--canvas);border:0.5px solid var(--bdr);border-radius:6px;
  outline:none;transition:all .15s var(--ease);
}
.field input:focus{border-color:var(--prime);box-shadow:0 0 0 3px var(--prime-bg);background:var(--s1)}
.field input::placeholder{color:var(--t4)}
.field-pw-toggle{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  font-family:var(--m);font-size:9.5px;font-weight:500;letter-spacing:1px;
  color:var(--t3);padding:4px 8px;
}
.field-pw-toggle:hover{color:var(--ink)}
.field-error{font-size:11.5px;color:var(--bad);margin-top:5px;display:none;font-family:var(--b)}
.forgot{display:block;text-align:right;margin:6px 2px 18px}
.forgot a{font-size:12px;color:var(--prime-ink);font-weight:500;cursor:pointer}
[data-theme="night"] .forgot a{color:var(--prime)}
.forgot a:hover{text-decoration:underline}

/* Primary submit — uses ink fill (not prime) so night theme isn't dominated by purple */
.submit{
  width:100%;padding:13px 16px;
  font-family:var(--b);font-size:14px;font-weight:600;letter-spacing:0.01em;
  background:var(--ink);color:var(--bg);
  border:none;border-radius:6px;cursor:pointer;
  transition:all .2s var(--ease);
}
.submit:hover{opacity:0.92;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.12)}
[data-theme="night"] .submit:hover{box-shadow:0 4px 16px rgba(0,0,0,0.4)}
.submit:active{transform:translateY(0)}
.submit:disabled{opacity:0.55;cursor:not-allowed;transform:none;box-shadow:none}

/* Bottom CTA */
.alt-cta{
  text-align:center;margin-top:22px;font-size:13px;color:var(--t2);
  padding-top:18px;border-top:0.5px solid var(--bdr);
}
.alt-cta a{color:var(--prime-ink);font-weight:600;cursor:pointer}
[data-theme="night"] .alt-cta a{color:var(--prime)}
.alt-cta a:hover{text-decoration:underline}

/* Trust strip */
.trust{
  display:flex;justify-content:center;gap:22px;margin-top:28px;
  font-family:var(--m);font-size:10.5px;color:var(--t3);
  letter-spacing:1.2px;text-transform:uppercase;
  animation:cardIn .6s var(--ease) .15s both;
}
.trust span{display:flex;align-items:center;gap:6px}
.trust span::before{
  content:'';width:5px;height:5px;border-radius:50%;
  background:var(--t3);opacity:0.6;
}

/* Foot link */
.foot-link{
  text-align:center;margin-top:24px;font-size:13px;color:var(--t3);
  animation:cardIn .6s var(--ease) .25s both;
}
.foot-link a{transition:color .15s}
.foot-link a:hover{color:var(--ink)}

@media(max-width:480px){
  .card{padding:28px 22px}
  .hero h1{font-size:30px;letter-spacing:-1px}
  .ni{padding:0 18px}
  main{padding:32px 18px}
}
@media(prefers-reduced-motion:reduce){
  .card,.trust,.foot-link,.hero h1 em::after{animation:none!important;opacity:1!important}
}
</style>
</head>
<body>

<!-- Topbar -->
<nav>
  <div class="ni">
    <a href="/" class="nl" aria-label="Castford home">
      <svg viewBox="0 0 100 100" width="22" height="22" aria-hidden="true">
        <path d="M50 10 L85 30 L85 70 L50 90 L15 70 L15 30 Z" fill="none" stroke="var(--logo-main)" stroke-width="1.2" style="opacity:var(--logo-outer-o)"/>
        <path d="M50 16 L80 33 L80 67 L50 84 L20 67 L20 33 Z" fill="none" stroke="var(--logo-main)" stroke-width="2.5"/>
        <path d="M36 47 L50 39 L64 47 L64 57 L50 65 L36 57 Z" fill="var(--logo-inner)" style="opacity:var(--logo-inner-fill)"/>
        <path d="M36 47 L50 39 L64 47 L64 57 L50 65 L36 57 Z" fill="none" stroke="var(--logo-inner)" stroke-width="1.5"/>
        <circle cx="50" cy="52" r="3" fill="var(--logo-core)"/>
      </svg>
      <span class="nl-name">Castford</span>
    </a>
    <div class="nr">
      <button class="toggle" id="themeToggle" aria-label="Toggle day/night theme"></button>
    </div>
  </div>
</nav>

<!-- Main -->
<main>
  <div class="shell">
    <div class="hero" data-energy>
      <div class="eyebrow">SIGN IN</div>
      <h1>Welcome <em>back</em>.</h1>
      <p>Continue to your Castford workspace.</p>
    </div>

    <div id="loginNotice" style="display:none;max-width:420px;margin:0 auto 16px;padding:12px 16px;border:1px solid var(--prime-bdr,rgba(91,127,204,0.18));background:var(--prime-bg,rgba(91,127,204,0.06));border-radius:6px;font-size:13px;color:var(--t1,#1A2238);text-align:center"></div>
    <script>
    (function(){
      var p = new URLSearchParams(window.location.search);
      var reason = p.get('reason');
      var msg = '';
      if (reason === 'stale_session') msg = 'Your session expired. Please sign in again to continue.';
      else if (reason === 'session_expired') msg = 'Your session has timed out. Please sign in again.';
      if (msg) {
        var el = document.getElementById('loginNotice');
        if (el) { el.textContent = msg; el.style.display = 'block'; }
      }
    })();
    </script>

    <div class="card" data-energy>
      <!-- OAuth buttons -->
      <div class="oauth-row">
        <button type="button" class="oauth-btn" id="btn-apple">
          <span class="spinner"></span>
          <svg viewBox="0 0 24 24"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z" fill="currentColor"/></svg>
          <span class="btn-label">Continue with Apple</span>
        </button>
        <button type="button" class="oauth-btn" id="btn-google">
          <span class="spinner"></span>
          <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09a7.12 7.12 0 010-4.17V7.08H2.18a11.97 11.97 0 000 9.84l3.66-2.83z" fill="#FBBC05"/><path d="M12 4.75c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 1.09 14.97 0 12 0 7.7 0 3.99 2.47 2.18 6.07l3.66 2.84c.87-2.6 3.3-4.16 6.16-4.16z" fill="#EA4335"/></svg>
          <span class="btn-label">Continue with Google</span>
        </button>
        <button type="button" class="oauth-btn" id="btn-sso">
          <span class="spinner"></span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L4 6v6c0 5 3.5 9 8 10 4.5-1 8-5 8-10V6l-8-4z"/>
            <path d="M9 12l2 2 4-4"/>
          </svg>
          <span class="btn-label">Continue with SSO</span>
        </button>
      </div>

      <div class="divider"><span>OR</span></div>

      <!-- Email/password form -->
      <form id="loginForm" novalidate>
        <div class="field">
          <label for="email">Work email</label>
          <input type="email" id="email" name="email" autocomplete="email" required placeholder="you@company.com">
          <div class="field-error" id="emailError">Please enter a valid email.</div>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <div class="field-wrap">
            <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="••••••••" minlength="8">
            <button type="button" class="field-pw-toggle" id="togglePw">SHOW</button>
          </div>
          <div class="field-error" id="pwError">Password must be at least 8 characters.</div>
        </div>
        <div class="forgot"><a id="forgotLink">Forgot password?</a></div>
        <button type="submit" class="submit" id="submitBtn">Sign in</button>
      </form>

      <div class="alt-cta">
        New to Castford? <a id="signupLink" href="/signup">Get started →</a>
      </div>
    </div>

    <div class="trust" data-energy>
      <span>SOC 2 ready</span>
      <span>256-bit AES</span>
      <span>30-day MBG</span>
    </div>

    <div class="foot-link" data-energy><a href="/">← Back to castford.com</a></div>
  </div>
</main>

<!-- Live infrastructure: matches castford.com auth pages -->
<script src="/site/rain.js" defer></script>
<script src="/site/castford-shell.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL='https://crecesswagluelvkesul.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNyZWNlc3N3YWdsdWVsdmtlc3VsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MTI5NzYsImV4cCI6MjA4OTM4ODk3Nn0.IGEEYDStt-eH9Mf2G_DzqCPfruDjN8m_ORtAcmtSAZg';
const sb = window.supabase.createClient(SB_URL, SB_KEY);
const RD = window.location.origin + '/home';

// Theme toggle
document.getElementById('themeToggle').addEventListener('click', ()=>{
  const h=document.documentElement;
  h.dataset.theme = h.dataset.theme==='day'?'night':'day';
  localStorage.setItem('cf-theme', h.dataset.theme);
});

// Honor ?return=<path> if present (came from pack-guard or other guard)
function getReturnPath(){
  try {
    const qs = new URLSearchParams(window.location.search);
    const ret = qs.get('return');
    if (ret && ret.startsWith('/') && !ret.startsWith('//')) return ret;
  } catch(_){}
  return null;
}

async function goToUserHome(){
  const ret = getReturnPath();
  if (ret){ window.location.href = ret; return; }
  try {
    const {data:{session}} = await sb.auth.getSession();
    if (!session){ window.location.href = '/login'; return; }
    // Fire verify-session in the background to provision org if first sign-in
    fetch(SB_URL + '/functions/v1/verify-session', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + session.access_token, 'Content-Type': 'application/json' }
    }).catch(()=>{});
    window.location.href = '/home';
  } catch(e){ window.location.href = RD; }
}

// Auto-redirect if already signed in
sb.auth.getSession().then(({data:{session}})=>{
  if (session) goToUserHome();
});

// Apple OAuth
document.getElementById('btn-apple').addEventListener('click', async ()=>{
  const b = document.getElementById('btn-apple');
  b.classList.add('loading'); b.disabled=true;
  const ret = getReturnPath();
  const redirectTo = ret ? (window.location.origin + ret) : RD;
  const { error } = await sb.auth.signInWithOAuth({ provider:'apple', options:{ redirectTo } });
  if (error){ b.classList.remove('loading'); b.disabled=false;
    alert('Apple sign-in is temporarily unavailable. Please try email or Google.');
  }
});

// Google OAuth
document.getElementById('btn-google').addEventListener('click', async ()=>{
  const b = document.getElementById('btn-google');
  b.classList.add('loading'); b.disabled=true;
  const ret = getReturnPath();
  const redirectTo = ret ? (window.location.origin + ret) : RD;
  const { error } = await sb.auth.signInWithOAuth({ provider:'google', options:{ redirectTo } });
  if (error){ b.classList.remove('loading'); b.disabled=false;
    alert('Google sign-in is temporarily unavailable. Please try email or Apple.');
  }
});

// SSO / SAML — for enterprise customers using Okta, Azure AD, Google Workspace SAML, etc.
document.getElementById('btn-sso').addEventListener('click', async ()=>{
  const b = document.getElementById('btn-sso');
  const email = prompt('Enter your work email — we\'ll route you to your company\'s SSO provider:');
  if (!email) return;
  const at = email.indexOf('@');
  if (at < 1 || at === email.length-1){
    alert('Please enter a valid work email (e.g., you@company.com).'); return;
  }
  const domain = email.slice(at+1).trim().toLowerCase();
  if (!domain.includes('.')){ alert('Please enter a valid work email.'); return; }
  b.classList.add('loading'); b.disabled=true;
  const ret = getReturnPath();
  const redirectTo = ret ? (window.location.origin + ret) : RD;
  try {
    const { data, error } = await sb.auth.signInWithSSO({ domain, options:{ redirectTo } });
    if (error){
      b.classList.remove('loading'); b.disabled=false;
      const code = error.code || error.status || '';
      if (String(code).includes('sso') || String(error.message||'').toLowerCase().includes('not found') || String(error.message||'').toLowerCase().includes('no sso')){
        alert('No SSO is configured for ' + domain + '. Use Apple, Google, or email/password — or contact your admin to set up SAML SSO.');
      } else {
        alert('SSO sign-in failed: ' + (error.message || 'Unknown error'));
      }
      return;
    }
    if (data && data.url){ window.location.href = data.url; return; }
    b.classList.remove('loading'); b.disabled=false;
    alert('SSO did not return a redirect URL. Please try again or contact your admin.');
  } catch(err){
    b.classList.remove('loading'); b.disabled=false;
    alert('SSO is currently unavailable. Please use Apple, Google, or email/password.');
  }
});

// Email/password sign-in
document.getElementById('loginForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const em = document.getElementById('email').value.trim();
  const pw = document.getElementById('password').value;
  const emailErr = document.getElementById('emailError');
  const pwErr = document.getElementById('pwError');
  emailErr.style.display='none'; pwErr.style.display='none';
  if (!em || !em.includes('@')){ emailErr.style.display='block'; return; }
  if (!pw || pw.length < 8){
    pwErr.textContent='Password must be at least 8 characters.';
    pwErr.style.display='block'; return;
  }
  const btn = document.getElementById('submitBtn');
  btn.textContent='Signing in…'; btn.disabled=true;
  const { error } = await sb.auth.signInWithPassword({ email: em, password: pw });
  if (error){
    btn.textContent='Sign in'; btn.disabled=false;
    pwErr.textContent='Sign-in failed. Check your credentials and try again.';
    pwErr.style.display='block';
    return;
  }
  goToUserHome();
});

// Show/hide password
document.getElementById('togglePw').addEventListener('click', ()=>{
  const p = document.getElementById('password');
  const b = document.getElementById('togglePw');
  p.type = p.type==='password'?'text':'password';
  b.textContent = p.type==='password'?'SHOW':'HIDE';
});

// Forgot password
document.getElementById('forgotLink').addEventListener('click', ()=>{
  const e = prompt('Enter your email for a reset link:');
  if (e){
    sb.auth.resetPasswordForEmail(e, {
      redirectTo: window.location.origin + '/site/reset-password.html'
    }).then(()=>{
      alert('If an account exists for that email, a reset link has been sent. Check your inbox.');
    });
  }
});
</script>

<!-- Energy system loads last so it can pick up all [data-energy] elements -->
<script src="/site/castford-energy.js" defer></script>

</body>
</html>
