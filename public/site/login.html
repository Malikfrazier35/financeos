<!DOCTYPE html>
<html lang="en" data-theme="day">
<head>
<script>((d)=>{const t=localStorage.getItem("cf-theme");if(t)d.dataset.theme=t})(document.documentElement)</script>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Castford</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=Instrument+Sans:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/site/theme.css">
<script src="/site/rain.js" defer></script>
<style>
body{min-height:100vh;display:flex;flex-direction:column}
.login-geo{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.lg{position:absolute;will-change:opacity,transform;opacity:0;animation:lgB var(--dur) ease-in-out infinite;animation-delay:var(--del)}
.lg svg{width:100%;height:100%}
@keyframes lgB{0%,100%{opacity:var(--lo);transform:scale(1)}50%{opacity:var(--hi);transform:scale(1.04)}}
.login-scan{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.login-scan::after{content:'';position:absolute;top:0;left:0;width:100%;height:200%;background:linear-gradient(180deg,transparent 40%,rgba(26,63,122,0.07) 48%,transparent 52%);animation:lsV 14s ease-in-out infinite}
[data-theme="night"] .login-scan::after{background:linear-gradient(180deg,transparent 40%,rgba(155,138,255,0.08) 48%,transparent 52%)}
@keyframes lsV{0%{transform:translateY(-60%)}50%{transform:translateY(20%)}100%{transform:translateY(-60%)}}
.login-page{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;z-index:2;padding:32px 20px;min-height:100vh}
.login-top{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 32px}
.login-top-logo{display:flex;align-items:center;gap:8px;font-family:var(--d);font-size:16px;font-weight:700;color:var(--ink);text-decoration:none}
.login-card{width:100%;max-width:400px;background:var(--s1);border:1px solid var(--bdr);padding:40px 36px;box-shadow:0 8px 40px rgba(26,63,122,0.10);border-top:3px solid var(--prime);animation:lcIn .6s var(--ease) both}
[data-theme="night"] .login-card{box-shadow:0 8px 40px rgba(0,0,0,0.35)}
@keyframes lcIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.lc-logo{text-align:center;margin-bottom:28px}
.lc-logo svg{width:48px;height:48px;margin:0 auto 12px;display:block}
.lc-logo h1{font-family:var(--d);font-size:22px;font-weight:700;letter-spacing:-0.5px}
.lc-logo p{font-size:13px;color:var(--t2);margin-top:4px}
.lo-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:11px;border:1px solid var(--bdr);background:var(--s1);color:var(--ink);font-size:14px;font-weight:500;font-family:var(--b);cursor:pointer;transition:all .15s;margin-bottom:8px}
.lo-btn:hover{border-color:var(--prime);background:var(--prime-bg)}
.lo-btn:active{transform:scale(0.98)}
.lo-btn .spinner{display:none;width:16px;height:16px;border:2px solid var(--bdr);border-top-color:var(--prime);border-radius:50%;animation:spin .6s linear infinite}
.lo-btn.loading .spinner{display:block}
.lo-btn.loading .btn-label{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.lc-divider{display:flex;align-items:center;gap:14px;margin:18px 0}
.lc-divider::before,.lc-divider::after{content:'';flex:1;height:1px;background:var(--bdr)}
.lc-divider span{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;font-family:var(--m)}
.lc-field{margin-bottom:14px}
.lc-field label{display:block;font-size:12px;font-weight:600;margin-bottom:5px;color:var(--t2);text-transform:uppercase;letter-spacing:0.5px}
.lc-field-wrap{position:relative}
.lc-field input{width:100%;padding:11px 14px;border:1px solid var(--bdr);background:var(--s1);color:var(--ink);font-size:14px;font-family:var(--b);outline:none;transition:all .15s}
.lc-field input:focus{border-color:var(--prime);box-shadow:0 0 0 3px var(--prime-bg)}
.lc-field input::placeholder{color:var(--t3)}
.lc-toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t3);font-size:11px;cursor:pointer;font-family:var(--m);padding:4px 8px;letter-spacing:0.5px}
.lc-toggle-pw:hover{color:var(--ink)}
.lc-error{font-size:11px;color:#E24B4A;margin-top:4px;display:none}
.lc-forgot{text-align:right;margin-bottom:18px}
.lc-forgot a{color:var(--prime);cursor:pointer;font-size:12px;font-weight:500}
.lc-forgot a:hover{text-decoration:underline}
.lc-submit{width:100%;padding:12px;background:var(--prime);color:#fff;font-size:15px;font-weight:600;font-family:var(--b);border:none;cursor:pointer;transition:all .2s;letter-spacing:0.3px}
.lc-submit:hover{opacity:0.9;transform:translateY(-1px);box-shadow:0 4px 16px rgba(26,63,122,0.2)}
.lc-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.lc-signup{text-align:center;margin-top:20px;font-size:13px;color:var(--t2)}
.lc-signup a{color:var(--prime);cursor:pointer;font-weight:600}
.lc-signup a:hover{text-decoration:underline}
.lc-trust{display:flex;justify-content:center;gap:24px;margin-top:28px;animation:lcIn .6s var(--ease) .15s both}
.lc-trust-item{font-family:var(--m);font-size:11px;color:var(--t3);letter-spacing:0.4px;display:flex;align-items:center;gap:6px}
.lc-trust-dot{width:5px;height:5px;background:var(--prime);opacity:0.4}
.lc-back{margin-top:20px;animation:lcIn .6s var(--ease) .25s both}
.lc-back a{font-size:13px;color:var(--t3);text-decoration:none;display:flex;align-items:center;gap:6px}
.lc-back a:hover{color:var(--prime)}
@media(max-width:480px){.login-card{padding:32px 24px}.login-top{padding:12px 16px}}
@media(prefers-reduced-motion:reduce){.lg,.login-scan::after,.login-card,.lc-trust,.lc-back{animation:none!important;opacity:1!important}}
</style>
<script src="/site/castford-shell.js" defer></script>
</head>
<body>
<div class="login-geo">
  <div class="lg" style="top:6%;left:5%;width:120px;height:104px;--dur:7s;--del:0s;--lo:0.05;--hi:0.20"><svg viewBox="0 0 120 104"><path d="M60 1L119 27L119 77L60 103L1 77L1 27Z" fill="none" stroke="var(--prime)" stroke-width="1.4"/></svg></div>
  <div class="lg" style="top:16%;right:7%;width:160px;height:139px;--dur:9s;--del:1.5s;--lo:0.04;--hi:0.16"><svg viewBox="0 0 160 139"><path d="M80 1L159 36L159 103L80 138L1 103L1 36Z" fill="none" stroke="var(--prime)" stroke-width="1.2"/></svg></div>
  <div class="lg" style="top:48%;left:3%;width:90px;height:78px;--dur:6s;--del:3s;--lo:0.05;--hi:0.22"><svg viewBox="0 0 90 78"><path d="M45 1L89 21L89 57L45 77L1 57L1 21Z" fill="none" stroke="var(--prime)" stroke-width="1.3"/></svg></div>
  <div class="lg" style="bottom:12%;right:5%;width:130px;height:113px;--dur:10s;--del:0.8s;--lo:0.04;--hi:0.17"><svg viewBox="0 0 130 113"><path d="M65 1L129 30L129 83L65 112L1 83L1 30Z" fill="none" stroke="var(--prime)" stroke-width="1.1"/></svg></div>
  <div class="lg" style="bottom:28%;left:16%;width:70px;height:61px;--dur:8s;--del:5s;--lo:0.05;--hi:0.18"><svg viewBox="0 0 70 61"><path d="M35 1L69 17L69 44L35 60L1 44L1 17Z" fill="none" stroke="var(--warm)" stroke-width="1.1"/></svg></div>
  <div class="lg" style="top:34%;right:20%;width:55px;height:48px;--dur:11s;--del:6.5s;--lo:0.04;--hi:0.15"><svg viewBox="0 0 55 48"><path d="M27 1L54 13L54 35L27 47L1 35L1 13Z" fill="none" stroke="var(--prime)" stroke-width="1.0"/></svg></div>
  <div class="lg" style="top:72%;left:38%;width:80px;height:69px;--dur:7.5s;--del:2.5s;--lo:0.04;--hi:0.14"><svg viewBox="0 0 80 69"><path d="M40 1L79 18L79 51L40 68L1 51L1 18Z" fill="none" stroke="var(--prime)" stroke-width="1.0"/></svg></div>
  <div class="lg" style="top:10%;left:40%;width:45px;height:39px;--dur:9.5s;--del:8s;--lo:0.04;--hi:0.13"><svg viewBox="0 0 45 39"><path d="M22 1L44 11L44 28L22 38L1 28L1 11Z" fill="none" stroke="var(--warm)" stroke-width="0.9"/></svg></div>
</div>
<div class="login-scan"></div>
<div class="login-top">
  <a class="login-top-logo" href="/"><svg viewBox="0 0 100 100" width="22" height="22"><path d="M50 16 L80 33 L80 67 L50 84 L20 67 L20 33 Z" fill="none" stroke="var(--prime)" stroke-width="2.5"/><path d="M36 47 L50 39 L64 47 L64 57 L50 65 L36 57 Z" fill="none" stroke="var(--prime)" stroke-width="1.5"/><circle cx="50" cy="52" r="3" fill="var(--prime)"/></svg> Castford</a>
  <div class="cf-toggle" id="themeToggle" title="Toggle day/night"></div>
</div>
<div class="login-page">
  <div class="login-card">
    <div class="lc-logo"><svg viewBox="0 0 100 100"><path d="M50 10 L85 30 L85 70 L50 90 L15 70 L15 30 Z" fill="none" stroke="var(--prime)" stroke-width="1.2" opacity="0.3"/><path d="M50 16 L80 33 L80 67 L50 84 L20 67 L20 33 Z" fill="none" stroke="var(--prime)" stroke-width="2.5"/><path d="M36 47 L50 39 L64 47 L64 57 L50 65 L36 57 Z" fill="var(--prime)" fill-opacity="0.06" stroke="var(--prime)" stroke-width="1.5"/><circle cx="50" cy="52" r="3" fill="var(--prime)"/></svg><h1>Welcome back</h1><p>Sign in to your Castford account</p></div>
    <button class="lo-btn" id="btn-google" type="button"><div class="spinner"></div><svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09a7.12 7.12 0 010-4.17V7.08H2.18a11.97 11.97 0 000 9.84l3.66-2.83z" fill="#FBBC05"/><path d="M12 4.75c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 1.09 14.97 0 12 0 7.7 0 3.99 2.47 2.18 6.07l3.66 2.84c.87-2.6 3.3-4.16 6.16-4.16z" fill="#EA4335"/></svg><span class="btn-label">Continue with Google</span></button>
    <button class="lo-btn" id="btn-apple" type="button"><div class="spinner"></div><svg width="18" height="18" viewBox="0 0 24 24"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z" fill="currentColor"/></svg><span class="btn-label">Continue with Apple</span></button>
    <button class="lo-btn" id="btn-sso" type="button"><div class="spinner"></div><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--t2)" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg><span class="btn-label">Continue with SSO</span></button>
    <div class="lc-divider"><span>or</span></div>
    <form id="loginForm" autocomplete="on">
      <div class="lc-field"><label for="email">Email</label><input type="email" id="email" placeholder="you@company.com" autocomplete="email"><div class="lc-error" id="emailError">Enter a valid email address</div></div>
      <div class="lc-field"><label for="password">Password</label><div class="lc-field-wrap"><input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"><button type="button" class="lc-toggle-pw" id="togglePw">SHOW</button></div><div class="lc-error" id="pwError">Password must be at least 12 characters</div></div>
      <div class="lc-forgot"><a id="forgotLink">Forgot password?</a></div>
      <button type="submit" class="lc-submit" id="submitBtn">Sign In</button>
    </form>
    <div class="lc-signup">No account? <a id="signupLink">Get Started</a></div>
  </div>
  <div class="lc-trust"><span class="lc-trust-item"><span class="lc-trust-dot"></span> SOC 2 Ready</span><span class="lc-trust-item"><span class="lc-trust-dot"></span> 256-bit AES</span><span class="lc-trust-item"><span class="lc-trust-dot"></span> SSO / SAML</span></div>
  <div class="lc-back"><a href="/">← Back to castford.com</a></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL='https://crecesswagluelvkesul.supabase.co',SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNyZWNlc3N3YWdsdWVsdmtlc3VsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MTI5NzYsImV4cCI6MjA4OTM4ODk3Nn0.IGEEYDStt-eH9Mf2G_DzqCPfruDjN8m_ORtAcmtSAZg',sb=window.supabase.createClient(SB_URL,SB_KEY),RD='/workspace';
async function goToUserHome(fallback){
  try {
    const {data:{session}} = await sb.auth.getSession();
    if (!session) { window.location.href = fallback || RD; return; }
    const resp = await fetch(SB_URL + '/functions/v1/verify-session', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + session.access_token, 'Content-Type': 'application/json' }
    });
    if (!resp.ok) { window.location.href = fallback || RD; return; }
    const d = await resp.json();
    const role = (d.user && d.user.dashboard_role) || 'standard';
    window.location.href = '/' + role;
  } catch(e) { window.location.href = fallback || RD; }
}

document.getElementById('themeToggle').addEventListener('click',()=>{const h=document.documentElement;h.dataset.theme=h.dataset.theme==='day'?'night':'day';localStorage.setItem('cf-theme',h.dataset.theme)});
sb.auth.getSession().then(({data:{session}})=>{if(session)goToUserHome(RD)});
document.getElementById('btn-apple').addEventListener('click',async()=>{const b=document.getElementById('btn-apple');b.classList.add('loading');const{error}=await sb.auth.signInWithOAuth({provider:'apple',options:{redirectTo:RD}});if(error){b.classList.remove('loading');alert('Apple sign-in is temporarily unavailable. Please try again or use another method.')}});
document.getElementById('btn-google').addEventListener('click',async()=>{const b=document.getElementById('btn-google');b.classList.add('loading');const{error}=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:RD}});if(error){b.classList.remove('loading');alert('Google sign-in is temporarily unavailable. Please try again or use another method.')}});
document.getElementById('loginForm').addEventListener('submit',async(e)=>{e.preventDefault();const em=document.getElementById('email').value.trim(),pw=document.getElementById('password').value;document.getElementById('emailError').style.display='none';document.getElementById('pwError').style.display='none';if(!em||!em.includes('@')){document.getElementById('emailError').style.display='block';return}if(!pw||pw.length<12){document.getElementById('pwError').textContent='Password must be at least 12 characters';document.getElementById('pwError').style.display='block';return}const btn=document.getElementById('submitBtn');btn.textContent='Signing in...';btn.disabled=true;const{error}=await sb.auth.signInWithPassword({email:em,password:pw});if(error){btn.textContent='Sign In';btn.disabled=false;document.getElementById('pwError').textContent='Sign in failed. Check your credentials and try again.';document.getElementById('pwError').style.display='block'}else{goToUserHome(RD)}});
document.getElementById('togglePw').addEventListener('click',()=>{const p=document.getElementById('password'),b=document.getElementById('togglePw');p.type=p.type==='password'?'text':'password';b.textContent=p.type==='password'?'SHOW':'HIDE'});
document.getElementById('btn-sso').addEventListener('click',()=>{const d=prompt('Enter your company email domain');if(d)sb.auth.signInWithSSO({domain:d}).then(({data,error})=>{if(error)alert('SSO is not configured for that domain. Please contact your administrator or use another sign-in method.');else if(data?.url)window.location.href=data.url})});
document.getElementById('forgotLink').addEventListener('click',()=>{const e=prompt('Enter your email for a reset link');if(e)sb.auth.resetPasswordForEmail(e,{redirectTo:'https://castford.com/site/reset-password.html'}).then(()=>{alert('If an account exists for that email, a password reset link has been sent. Please check your inbox.')})});
document.getElementById('signupLink').addEventListener('click',()=>{window.location.href='/pricing'});
</script>
</body>
</html>
