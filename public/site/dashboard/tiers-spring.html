<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Castford — Plan Tier Dashboard Previews (Corporate Spring)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#F8FAFC;--surface:#F1F5F9;--card:#FFFFFF;--border:rgba(15,23,42,0.06);--border-h:rgba(15,23,42,0.12);--t1:#0F172A;--t2:#475569;--t3:#94A3B8;--t4:#CBD5E1;--cyan:#06B6D4;--cm:rgba(6,182,212,0.08);--cg:rgba(6,182,212,0.12);--green:#059669;--gm:rgba(5,150,105,0.08);--amber:#D97706;--am:rgba(217,119,6,0.08);--red:#DC2626;--rm:rgba(220,38,38,0.08);--purple:#7C3AED;--pm:rgba(124,58,237,0.08);--r:12px;--rs:8px;--glass:0 1px 2px rgba(0,0,0,0.04),0 2px 8px rgba(0,0,0,0.04);--f:'Inter',-apple-system,sans-serif;--m:'JetBrains Mono','SF Mono',monospace;--t:0.25s cubic-bezier(0.4,0,0.2,1);--eo:cubic-bezier(0.16,1,0.3,1)}
  body{font-family:var(--f);background:var(--bg);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased}
  body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 1px 1px,rgba(15,23,42,0.025) 0.5px,transparent 0.5px);background-size:28px 28px;pointer-events:none}

  @keyframes fadeUp{0%{opacity:0;transform:translateY(16px)}100%{opacity:1;transform:translateY(0)}}
  @keyframes cardReveal{0%{opacity:0;transform:translateY(8px) scale(0.98)}100%{opacity:1;transform:translateY(0) scale(1)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  @keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
  @keyframes lockPulse{0%,100%{opacity:0.6}50%{opacity:1}}

  .glass{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--glass);position:relative;overflow:hidden;transition:all var(--t)}
  .glass::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(6,182,212,0.08),transparent)}
  .glass:hover{border-color:var(--border-h);box-shadow:var(--glass),0 4px 12px rgba(0,0,0,0.04)}

  /* ═══ HEADER ═══ */
  .header{position:sticky;top:0;z-index:50;background:rgba(248,250,252,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
  .header::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--cyan),var(--purple),var(--green));background-size:200% 100%;animation:shimmer 3s ease infinite}
  .logo{font-size:20px;font-weight:800;letter-spacing:-0.03em;display:flex;align-items:center;gap:10px}
  .logo-mark{width:32px;height:32px;border-radius:10px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(6,182,212,0.06)}
  .logo-mark svg{width:16px;height:16px;color:var(--cyan)}
  .logo span{background:linear-gradient(135deg,var(--cyan),#0891B2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .header-sub{font-size:12px;color:var(--t3);font-weight:500}

  /* ═══ TIER SWITCHER ═══ */
  .tier-switcher{display:flex;gap:2px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:3px;box-shadow:var(--glass)}
  .tier-btn{padding:8px 20px;border-radius:8px;border:none;background:transparent;font-family:var(--f);font-size:12px;font-weight:600;color:var(--t3);cursor:pointer;transition:all var(--t);display:flex;align-items:center;gap:6px}
  .tier-btn:hover{color:var(--t2)}
  .tier-btn.active-starter{background:var(--gm);color:var(--green);box-shadow:0 2px 8px rgba(5,150,105,0.1)}
  .tier-btn.active-growth{background:var(--cm);color:var(--cyan);box-shadow:0 2px 8px rgba(6,182,212,0.1)}
  .tier-btn.active-business{background:var(--pm);color:var(--purple);box-shadow:0 2px 8px rgba(124,58,237,0.1)}
  .tier-price{font-family:var(--m);font-size:10px;opacity:0.7}

  /* ═══ TIER INFO BAR ═══ */
  .tier-info{max-width:1200px;margin:24px auto 0;padding:0 40px}
  .tier-banner{padding:16px 24px;border-radius:var(--r);display:flex;align-items:center;justify-content:space-between;animation:fadeUp 0.5s var(--eo) both}
  .tier-banner-left{display:flex;align-items:center;gap:12px}
  .tier-badge{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;padding:4px 12px;border-radius:6px}
  .tier-desc{font-size:13px;font-weight:500}
  .tier-features{font-size:11px;color:var(--t3);display:flex;gap:16px;flex-wrap:wrap}
  .tier-feat{display:flex;align-items:center;gap:4px}
  .tier-feat svg{width:12px;height:12px}

  /* ═══ DASHBOARD SHELL ═══ */
  .dash-shell{max-width:1200px;margin:20px auto;padding:0 40px 60px;display:flex;gap:16px}
  .dash-sidebar{width:200px;flex-shrink:0}
  .dash-main{flex:1;min-width:0}

  .sb-section{margin-bottom:16px}
  .sb-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--t3);padding:0 10px;margin-bottom:4px}
  .sb-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--rs);font-size:12px;font-weight:500;cursor:pointer;transition:all var(--t);position:relative;color:var(--t3)}
  .sb-item:hover{background:var(--cm);color:var(--t1)}
  .sb-item.active{background:var(--cm);color:var(--cyan)}
  .sb-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:2.5px;height:14px;border-radius:0 2px 2px 0;background:var(--cyan)}
  .sb-item svg{width:14px;height:14px;flex-shrink:0}
  .sb-item .lock{margin-left:auto;display:flex;align-items:center;gap:3px;font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px}
  .sb-item.locked{opacity:0.45;cursor:not-allowed}
  .sb-item.locked:hover{background:transparent;color:var(--t3)}

  /* KPI Grid */
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
  .kpi{padding:16px;animation:cardReveal 0.5s var(--eo) both}
  .kpi:nth-child(2){animation-delay:0.05s}.kpi:nth-child(3){animation-delay:0.1s}.kpi:nth-child(4){animation-delay:0.15s}
  .kpi-label{font-size:9px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:6px;display:flex;align-items:center;gap:5px}
  .kpi-icon{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center}
  .kpi-icon svg{width:10px;height:10px}
  .kpi-val{font-size:22px;font-weight:700;font-family:var(--m);letter-spacing:-0.6px;line-height:1}
  .kpi-change{font-size:9px;font-weight:600;margin-top:3px;display:flex;align-items:center;gap:2px}
  .kpi-change.up{color:var(--green)}.kpi-change.down{color:var(--red)}

  /* Charts */
  .charts-row{display:grid;grid-template-columns:5fr 3fr;gap:12px;margin-bottom:16px}
  .chart{padding:18px;animation:cardReveal 0.5s var(--eo) 0.2s both}
  .chart:nth-child(2){animation-delay:0.25s}
  .chart-title{font-size:12px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
  .chart-live{font-size:8px;font-weight:700;padding:2px 7px;border-radius:4px;background:var(--gm);color:var(--green);display:flex;align-items:center;gap:3px}
  .chart-area{height:120px;display:flex;align-items:flex-end;gap:3px;padding:0 4px}
  .chart-bar{flex:1;border-radius:2px 2px 0 0;transition:height 0.5s var(--eo)}

  /* Table */
  .data-table{padding:16px;animation:cardReveal 0.5s var(--eo) 0.3s both;margin-bottom:16px}
  .data-table-title{font-size:12px;font-weight:700;margin-bottom:10px}
  table{width:100%;border-collapse:collapse}
  th{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--t3);text-align:left;padding:6px 8px;border-bottom:1px solid var(--border)}
  td{font-size:11px;padding:7px 8px;border-bottom:1px solid var(--border)}
  tr:hover td{background:rgba(6,182,212,0.02)}
  .pill{font-size:8px;font-weight:700;padding:2px 6px;border-radius:3px;text-transform:uppercase}

  /* ═══ LOCKED OVERLAY ═══ */
  .locked-section{position:relative}
  .locked-section.is-locked::after{content:'';position:absolute;inset:0;background:rgba(248,250,252,0.75);backdrop-filter:blur(3px);border-radius:var(--r);z-index:5}
  .lock-badge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 24px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.08);animation:fadeUp 0.4s var(--eo) both}
  .lock-badge svg{width:20px;height:20px;color:var(--t3);margin-bottom:6px}
  .lock-badge-title{font-size:12px;font-weight:700;margin-bottom:2px}
  .lock-badge-sub{font-size:10px;color:var(--t3);margin-bottom:8px}
  .lock-badge .upgrade-btn{padding:6px 16px;border-radius:6px;border:none;font-family:var(--f);font-size:11px;font-weight:700;color:white;cursor:pointer;transition:all var(--t)}
  .lock-badge .upgrade-btn:hover{filter:brightness(1.1);transform:translateY(-1px)}

  /* AI Insights */
  .ai-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
  .ai-card{padding:14px;animation:cardReveal 0.5s var(--eo) 0.35s both}
  .ai-card:nth-child(2){animation-delay:0.4s}.ai-card:nth-child(3){animation-delay:0.45s}
  .ai-header{display:flex;align-items:center;gap:6px;margin-bottom:6px}
  .ai-icon{width:20px;height:20px;border-radius:5px;background:var(--pm);color:var(--purple);display:flex;align-items:center;justify-content:center}
  .ai-icon svg{width:10px;height:10px}
  .ai-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:var(--purple)}
  .ai-text{font-size:11px;color:var(--t2);line-height:1.5}
  .ai-text b{color:var(--t1)}

  /* Team widget */
  .team-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
  .team-card{padding:14px;text-align:center;animation:cardReveal 0.5s var(--eo) 0.4s both}
  .team-card:nth-child(2){animation-delay:0.43s}.team-card:nth-child(3){animation-delay:0.46s}.team-card:nth-child(4){animation-delay:0.49s}
  .team-avatar{width:36px;height:36px;border-radius:10px;overflow:hidden;margin:0 auto 6px;border:2px solid var(--border)}
  .team-avatar img{width:100%;height:100%;object-fit:cover}
  .team-name{font-size:11px;font-weight:700}
  .team-role{font-size:9px;color:var(--t3)}
  .team-status{width:6px;height:6px;border-radius:50%;margin:4px auto 0}

  /* Command Center */
  .cmd-grid{display:grid;grid-template-columns:2fr 1fr;gap:12px}
  .cmd-card{padding:16px;animation:cardReveal 0.5s var(--eo) 0.5s both}
  .cmd-title{font-size:12px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .cmd-title svg{width:14px;height:14px;color:var(--purple)}
</style>
<script src="/site/castford-shell.js" defer></script>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">

  'Investor Metrics':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>',
  'SOX Audit':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
};

let currentTier = 'starter';

function switchTier(tier) {
  currentTier = tier;
  const btns = document.querySelectorAll('.tier-btn');
  btns.forEach(b => b.className = 'tier-btn');
  event.target.closest('.tier-btn').classList.add('active-'+tier);
  render(tier);
}

function render(tier) {
  const t = TIERS[tier];

  // Banner
  document.getElementById('tierBanner').innerHTML = `
    <div class="tier-banner-left">
      <div class="tier-badge" style="background:${t.bg};color:${t.color}">${t.label}</div>
      <div><div class="tier-desc">${t.desc}</div>
      <div class="tier-features">${t.features.map(f=>`<div class="tier-feat"><svg viewBox="0 0 24 24" fill="none" stroke="${t.color}" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>${f}</div>`).join('')}</div></div>
    </div>`;

  // Sidebar
  document.getElementById('sidebar').innerHTML = `
    <div class="sb-section"><div class="sb-label">Dashboard</div>
    ${t.sidebar.filter((_,i)=>i<5).map(s => s.locked
      ? `<div class="sb-item locked">${ICONS[s.label]||''} ${s.label} <div class="lock" style="background:${TIERS[s.tier.toLowerCase()]?.bg||'var(--cm)'};color:${TIERS[s.tier.toLowerCase()]?.color||'var(--cyan)'}"><svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>${s.tier}</div>`
      : `<div class="sb-item${s.active?' active':''}">${ICONS[s.label]||''} ${s.label}</div>`
    ).join('')}</div>
    <div class="sb-section"><div class="sb-label">Platform</div>
    ${t.sidebar.filter((_,i)=>i>=5).map(s => s.locked
      ? `<div class="sb-item locked">${ICONS[s.label]||''} ${s.label} <div class="lock" style="background:${TIERS[s.tier.toLowerCase()]?.bg||'var(--pm)'};color:${TIERS[s.tier.toLowerCase()]?.color||'var(--purple)'}"><svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>${s.tier}</div>`
      : `<div class="sb-item${s.active?' active':''}">${ICONS[s.label]||''} ${s.label}</div>`
    ).join('')}</div>`;

  // Main
  let html = '';

  // KPIs
  html += `<div class="kpi-grid">${t.kpis.map((k,i)=>`
    <div class="kpi glass" style="animation-delay:${i*0.05}s">
      <div class="kpi-label"><div class="kpi-icon" style="background:${k.bg};color:${k.color}"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>${k.label}</div>
      <div class="kpi-val">${k.val}</div>
      <div class="kpi-change ${k.up?'up':'down'}"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="${k.up?'18 15 12 9 6 15':'6 9 12 15 18 9'}"/></svg>${k.change}</div>
    </div>`).join('')}</div>`;

  // Charts
  const bars1 = Array.from({length:12},()=>25+Math.random()*75);
  const bars2 = Array.from({length:12},()=>25+Math.random()*75);
  html += `<div class="charts-row">
    <div class="chart glass"><div class="chart-title">${t.charts.t1} <div class="chart-live"><div style="width:4px;height:4px;border-radius:50%;background:var(--green);animation:pulse 2s infinite"></div>Live</div></div>
      <div class="chart-area">${bars1.map(h=>`<div class="chart-bar" style="height:${h}%;background:var(--cyan);opacity:${0.3+Math.random()*0.7}"></div>`).join('')}</div></div>
    <div class="chart glass"><div class="chart-title">${t.charts.t2}</div>
      <div class="chart-area">${bars2.map(h=>`<div class="chart-bar" style="height:${h}%;background:var(--green);opacity:${0.3+Math.random()*0.7}"></div>`).join('')}</div></div>
  </div>`;

  // Table
  html += `<div class="data-table glass"><div class="data-table-title">${t.table.title}</div>
    <table><thead><tr>${t.table.heads.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${t.table.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;

  // Forecast section (locked for Starter)
  if (t.locked.forecast) {
    html += `<div class="locked-section is-locked" style="min-height:140px;margin-bottom:16px">
      <div class="charts-row"><div class="chart glass" style="filter:blur(2px)"><div class="chart-title">Forecast Model</div><div class="chart-area">${Array.from({length:12},()=>`<div class="chart-bar" style="height:${30+Math.random()*60}%;background:var(--purple);opacity:0.3"></div>`).join('')}</div></div>
      <div class="chart glass" style="filter:blur(2px)"><div class="chart-title">Scenario Planning</div><div class="chart-area">${Array.from({length:12},()=>`<div class="chart-bar" style="height:${30+Math.random()*60}%;background:var(--amber);opacity:0.3"></div>`).join('')}</div></div></div>
      <div class="lock-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <div class="lock-badge-title">Forecasting & Scenarios</div>
        <div class="lock-badge-sub">Available on Growth plan ($1,499/mo)</div>
        <button class="upgrade-btn" style="background:var(--cyan)">Upgrade to Growth</button></div></div>`;
  }

  // AI Insights (locked for Starter)
  if (t.locked.ai) {
    html += `<div class="locked-section is-locked" style="min-height:100px;margin-bottom:16px">
      <div class="ai-strip" style="filter:blur(2px)">
        <div class="ai-card glass"><div class="ai-header"><div class="ai-icon"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 014 4v2H8V6a4 4 0 014-4z"/><rect x="3" y="8" width="18" height="12" rx="2"/></svg></div><div class="ai-label">AI Insight</div></div><div class="ai-text">Revenue trending above forecast...</div></div>
        <div class="ai-card glass"><div class="ai-header"><div class="ai-icon"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 014 4v2H8V6a4 4 0 014-4z"/><rect x="3" y="8" width="18" height="12" rx="2"/></svg></div><div class="ai-label">AI Insight</div></div><div class="ai-text">OPEX variance detected in...</div></div>
        <div class="ai-card glass"><div class="ai-header"><div class="ai-icon"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 014 4v2H8V6a4 4 0 014-4z"/><rect x="3" y="8" width="18" height="12" rx="2"/></svg></div><div class="ai-label">AI Insight</div></div><div class="ai-text">Cash runway extended by...</div></div>
      </div>
      <div class="lock-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <div class="lock-badge-title">AI Copilot & Insights</div>
        <div class="lock-badge-sub">Available on Growth plan ($1,499/mo)</div>
        <button class="upgrade-btn" style="background:var(--cyan)">Upgrade to Growth</button></div></div>`;
  } else {
    html += `<div class="ai-strip">
      <div class="ai-card glass"><div class="ai-header"><div class="ai-icon"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div><div class="ai-label">Variance Alert</div></div><div class="ai-text"><b>Marketing OPEX</b> is $67K over budget — caused by Salesforce annual renewal. Auto-reclassified to prepaid.</div></div>
      <div class="ai-card glass"><div class="ai-header"><div class="ai-icon"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg></div><div class="ai-label">Forecast</div></div><div class="ai-text">Revenue trending <b>7.7% above</b> Q1 forecast. Recommend updating board deck projections.</div></div>
      <div class="ai-card glass"><div class="ai-header"><div class="ai-icon"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div class="ai-label">Runway</div></div><div class="ai-text">Cash runway extended to <b>18.2 months</b> (+2.4mo) after updated headcount plan.</div></div>
    </div>`;
  }

  // Team & Command Center (locked for Starter/Growth)
  if (t.locked.team) {
    html += `<div class="locked-section is-locked" style="min-height:120px;margin-bottom:16px">
      <div class="team-strip" style="filter:blur(2px)">
        <div class="team-card glass"><div class="team-avatar"><img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=60&h=60&fit=crop&crop=face"/></div><div class="team-name">Sarah C.</div><div class="team-role">CFO</div></div>
        <div class="team-card glass"><div class="team-avatar"><img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=60&h=60&fit=crop&crop=face"/></div><div class="team-name">James R.</div><div class="team-role">FP&A</div></div>
        <div class="team-card glass"><div class="team-avatar"><img src="https://images.unsplash.com/photo-1580489944761-15a19d654956?w=60&h=60&fit=crop&crop=face"/></div><div class="team-name">Priya P.</div><div class="team-role">Controller</div></div>
        <div class="team-card glass"><div class="team-avatar"><img src="https://images.unsplash.com/photo-1560250097-0b93528c311a?w=60&h=60&fit=crop&crop=face"/></div><div class="team-name">David K.</div><div class="team-role">RevOps</div></div>
      </div>
      <div class="lock-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <div class="lock-badge-title">Team Management & Command Center</div>
        <div class="lock-badge-sub">Available on Business plan ($3,999/mo)</div>
        <button class="upgrade-btn" style="background:var(--purple)">Upgrade to Business</button></div></div>`;
  } else {
    html += `<div class="team-strip">
      <div class="team-card glass"><div class="team-avatar"><img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=60&h=60&fit=crop&crop=face"/></div><div class="team-name">Sarah C.</div><div class="team-role">CFO</div><div class="team-status" style="background:var(--green)"></div></div>
      <div class="team-card glass"><div class="team-avatar"><img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=60&h=60&fit=crop&crop=face"/></div><div class="team-name">James R.</div><div class="team-role">FP&A</div><div class="team-status" style="background:var(--green)"></div></div>
      <div class="team-card glass"><div class="team-avatar"><img src="https://images.unsplash.com/photo-1580489944761-15a19d654956?w=60&h=60&fit=crop&crop=face"/></div><div class="team-name">Priya P.</div><div class="team-role">Controller</div><div class="team-status" style="background:var(--green)"></div></div>
      <div class="team-card glass"><div class="team-avatar"><img src="https://images.unsplash.com/photo-1560250097-0b93528c311a?w=60&h=60&fit=crop&crop=face"/></div><div class="team-name">David K.</div><div class="team-role">RevOps</div><div class="team-status" style="background:var(--amber)"></div></div>
    </div>`;
  }

  document.getElementById('dashMain').innerHTML = html;
}

// Initial
render('starter');
</script>
