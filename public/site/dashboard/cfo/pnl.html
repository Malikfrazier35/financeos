<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>P&L Statement · Castford CFO</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif&family=Geist+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script>window.__CFO_PAGE = 'pnl';</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script src="/site/auth-guard.js" defer></script>
  <script src="/site/cfo-subpage-shell.js" defer></script>
  <script src="/site/cfo-pnl-brain.js" defer></script>
</head>
<body>
  <main class="cfo-page">
    <h1 class="cfo-title">P&L Statement</h1>
    <p class="cfo-subtitle">Account-level drill-down with common-size analysis. Toggle period to compare windows.</p>

    <div id="period-toggle" style="display:flex;gap:2px;margin-bottom:24px;background:var(--panel);border:1px solid var(--panel-border);border-radius:2px;padding:4px;width:fit-content">
      <button class="period-btn" data-period="mtd">MTD</button>
      <button class="period-btn" data-period="qtd">QTD</button>
      <button class="period-btn" data-period="ytd">YTD</button>
      <button class="period-btn active" data-period="ttm">TTM</button>
      <button class="period-btn" data-period="all">All-Time</button>
    </div>
    <style>
      .period-btn { background: transparent; border: 0; color: var(--text-3); padding: 8px 14px; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; border-radius: 1px; transition: all 0.15s; font-family: inherit; }
      .period-btn:hover { color: var(--text-1); }
      .period-btn.active { background: var(--denim); color: white; }
    </style>

    <div class="cfo-kpi-row" id="pnl-kpis">
      <div class="cfo-kpi-card"><div class="k-label">Revenue</div><div class="k-value" data-kpi="revenue">—</div><div class="k-delta" data-kpi-delta="revenue" style="display:none"></div></div>
      <div class="cfo-kpi-card"><div class="k-label">Gross Profit</div><div class="k-value" data-kpi="gross_profit">—</div><div class="k-delta" style="background:rgba(91,127,204,0.1);color:var(--denim)" data-kpi-delta="gross_margin">—</div></div>
      <div class="cfo-kpi-card"><div class="k-label">OpEx</div><div class="k-value" data-kpi="opex">—</div><div class="k-delta" data-kpi-delta="opex" style="display:none"></div></div>
      <div class="cfo-kpi-card"><div class="k-label">Net Income</div><div class="k-value" data-kpi="net_income">—</div><div class="k-delta" style="background:rgba(91,127,204,0.1);color:var(--denim)" data-kpi-delta="net_margin">—</div></div>
    </div>

    <section class="cfo-panel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div class="cfo-panel-title" style="margin:0">Detailed P&L · <span id="period-label">TTM</span></div>
        <div style="display:flex;gap:16px;font-size:11px;color:var(--text-3)">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
            <input type="checkbox" id="toggle-common-size" style="accent-color:var(--denim)">
            Show as % of revenue (common-size)
          </label>
        </div>
      </div>
      <div id="pnl-table-wrap"><div class="cfo-loading">Loading live GL data…</div></div>
    </section>
  </main>
</body>
</html>
