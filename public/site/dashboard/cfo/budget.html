<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Budget vs Actual · Castford CFO</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif&family=Geist+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script>window.__CFO_PAGE = 'budget';</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script src="/site/auth-guard.js" defer></script>
  <script src="/site/cfo-subpage-shell.js" defer></script>
  <script src="/site/cfo-budget-brain.js" defer></script>
</head>
<body>
  <main class="cfo-page">
    <h1 class="cfo-title">Budget vs Actual</h1>
    <p class="cfo-subtitle">Variance analysis with attribution. Top drivers ranked by share of total variance.</p>

    <div class="cfo-kpi-row" id="budget-kpis">
      <div class="cfo-kpi-card"><div class="k-label">Total Actual</div><div class="k-value" data-kpi="actual">—</div></div>
      <div class="cfo-kpi-card"><div class="k-label">Total Budget</div><div class="k-value" data-kpi="budget">—</div></div>
      <div class="cfo-kpi-card"><div class="k-label">Variance</div><div class="k-value" data-kpi="variance">—</div></div>
      <div class="cfo-kpi-card"><div class="k-label">Variance %</div><div class="k-value" data-kpi="variance_pct">—</div></div>
    </div>

    <section class="cfo-panel" id="commentary-panel" style="background:rgba(91,127,204,0.05);border-color:rgba(91,127,204,0.2)">
      <div class="cfo-panel-title" style="color:var(--denim)">Variance Commentary</div>
      <div id="commentary-text" style="color:var(--text-1);font-size:14px;line-height:1.6"><div class="cfo-loading">Analyzing…</div></div>
    </section>

    <section class="cfo-panel">
      <div class="cfo-panel-title">Top 5 Variance Drivers</div>
      <div id="top-drivers"><div class="cfo-loading">Loading…</div></div>
    </section>

    <section class="cfo-panel">
      <div class="cfo-panel-title">Full Variance Table · All Accounts</div>
      <div id="budget-table"><div class="cfo-loading">Loading variance analysis…</div></div>
    </section>
  </main>
</body>
</html>
