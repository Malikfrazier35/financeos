<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FinanceOS — What Each Plan Gets (Corporate Spring)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#F8FAFC;--surface:#F1F5F9;--card:#FFFFFF;--border:rgba(15,23,42,0.06);--border-h:rgba(15,23,42,0.12);--t1:#0F172A;--t2:#475569;--t3:#94A3B8;--t4:#CBD5E1;--cyan:#06B6D4;--cm:rgba(6,182,212,0.08);--cg:rgba(6,182,212,0.12);--green:#059669;--gm:rgba(5,150,105,0.08);--amber:#D97706;--am:rgba(217,119,6,0.08);--red:#DC2626;--rm:rgba(220,38,38,0.08);--purple:#7C3AED;--pm:rgba(124,58,237,0.08);--r:12px;--rs:8px;--glass:0 1px 2px rgba(0,0,0,0.04),0 2px 8px rgba(0,0,0,0.04);--f:'Inter',-apple-system,sans-serif;--m:'JetBrains Mono','SF Mono',monospace;--t:0.25s cubic-bezier(0.4,0,0.2,1);--eo:cubic-bezier(0.16,1,0.3,1)}
  body{font-family:var(--f);background:var(--bg);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased}
  body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 1px 1px,rgba(15,23,42,0.025) 0.5px,transparent 0.5px);background-size:28px 28px;pointer-events:none}

  @keyframes fadeUp{0%{opacity:0;transform:translateY(16px)}100%{opacity:1;transform:translateY(0)}}
  @keyframes cardReveal{0%{opacity:0;transform:translateY(8px) scale(0.98)}100%{opacity:1;transform:translateY(0) scale(1)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  @keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
  @keyframes slideRight{0%{transform:translateX(-12px);opacity:0}100%{transform:translateX(0);opacity:1}}

  .glass{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--glass);position:relative;overflow:hidden;transition:all var(--t)}
  .glass::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(6,182,212,0.08),transparent)}
  .glass:hover{border-color:var(--border-h);box-shadow:var(--glass),0 4px 12px rgba(0,0,0,0.04)}

  /* Header */
  .header{position:sticky;top:0;z-index:50;background:rgba(248,250,252,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
  .header::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--cyan),var(--purple),var(--green));background-size:200% 100%;animation:shimmer 3s ease infinite}
  .logo{font-size:20px;font-weight:800;letter-spacing:-0.03em;display:flex;align-items:center;gap:10px}
  .logo-mark{width:32px;height:32px;border-radius:10px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(6,182,212,0.06)}
  .logo-mark svg{width:16px;height:16px;color:var(--cyan)}
  .logo span{background:linear-gradient(135deg,var(--cyan),#0891B2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

  .tier-switcher{display:flex;gap:2px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:3px;box-shadow:var(--glass)}
  .tier-btn{padding:8px 20px;border-radius:8px;border:none;background:transparent;font-family:var(--f);font-size:12px;font-weight:600;color:var(--t3);cursor:pointer;transition:all var(--t);display:flex;align-items:center;gap:6px}
  .tier-btn:hover{color:var(--t2)}
  .tier-btn.on{color:white;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
  .tier-btn .price{font-family:var(--m);font-size:10px;opacity:0.7}

  .header-sub{font-size:12px;color:var(--t3);font-weight:500}

  /* Shell */
  .dash-shell{max-width:1200px;margin:20px auto;padding:0 40px 60px;display:flex;gap:16px}
  .dash-sidebar{width:200px;flex-shrink:0}
  .dash-main{flex:1;min-width:0}

  .sb-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--t3);padding:0 10px;margin:14px 0 4px}
  .sb-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--rs);font-size:12px;font-weight:500;cursor:pointer;transition:all var(--t);position:relative;color:var(--t3)}
  .sb-item:hover{background:var(--cm);color:var(--t1)}
  .sb-item.active{background:var(--cm);color:var(--cyan)}
  .sb-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:2.5px;height:14px;border-radius:0 2px 2px 0;background:var(--cyan)}
  .sb-item svg{width:14px;height:14px;flex-shrink:0}

  /* Tier info */
  .tier-info{max-width:1200px;margin:20px auto 0;padding:0 40px}
  .tier-banner{padding:16px 24px;display:flex;align-items:center;gap:16px;animation:fadeUp 0.5s var(--eo) both}
  .tier-badge{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;padding:5px 14px;border-radius:6px;flex-shrink:0}
  .tier-desc{font-size:13px;font-weight:600}
  .tier-features{font-size:11px;color:var(--t3);display:flex;gap:14px;flex-wrap:wrap;margin-top:4px}
  .tier-feat{display:flex;align-items:center;gap:4px}
  .tier-feat svg{width:11px;height:11px;flex-shrink:0}

  /* KPIs */
  .kpi-grid{display:grid;gap:12px;margin-bottom:16px}
  .kpi{padding:16px;animation:cardReveal 0.5s var(--eo) both}
  .kpi-label{font-size:9px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:6px;display:flex;align-items:center;gap:5px}
  .kpi-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
  .kpi-val{font-size:22px;font-weight:700;font-family:var(--m);letter-spacing:-0.6px;line-height:1}
  .kpi-change{font-size:9px;font-weight:600;margin-top:3px;display:flex;align-items:center;gap:2px}
  .kpi-change.up{color:var(--green)}.kpi-change.down{color:var(--red)}

  /* Charts */
  .charts-row{display:grid;gap:12px;margin-bottom:16px}
  .chart{padding:18px;animation:cardReveal 0.5s var(--eo) 0.2s both}
  .chart-title{font-size:12px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
  .chart-live{font-size:8px;font-weight:700;padding:2px 7px;border-radius:4px;background:var(--gm);color:var(--green);display:flex;align-items:center;gap:3px}
  .chart-area{height:120px;display:flex;align-items:flex-end;gap:3px;padding:0 4px}
  .chart-bar{flex:1;border-radius:2px 2px 0 0;transition:height 0.5s var(--eo)}

  /* Table */
  .data-table{padding:16px;animation:cardReveal 0.5s var(--eo) 0.3s both;margin-bottom:16px}
  .data-table-title{font-size:12px;font-weight:700;margin-bottom:10px}
  table{width:100%;border-collapse:collapse}
  th{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--t3);text-align:left;padding:6px 8px;border-bottom:1px solid var(--border)}
  td{font-size:11px;padding:7px 8px;border-bottom:1px solid var(--border)}
  tr:hover td{background:rgba(6,182,212,0.02)}
  .pill{font-size:8px;font-weight:700;padding:2px 6px;border-radius:3px;text-transform:uppercase}

  /* AI Card */
  .ai-strip{display:grid;gap:12px;margin-bottom:16px}
  .ai-card{padding:14px;animation:cardReveal 0.5s var(--eo) 0.35s both}
  .ai-header{display:flex;align-items:center;gap:6px;margin-bottom:6px}
  .ai-icon{width:20px;height:20px;border-radius:5px;background:var(--pm);color:var(--purple);display:flex;align-items:center;justify-content:center}
  .ai-icon svg{width:10px;height:10px}
  .ai-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:var(--purple)}
  .ai-text{font-size:11px;color:var(--t2);line-height:1.5}
  .ai-text b{color:var(--t1)}

  /* Team */
  .team-strip{display:grid;gap:12px;margin-bottom:16px}
  .team-card{padding:14px;text-align:center;animation:cardReveal 0.5s var(--eo) 0.4s both}
  .team-avatar{width:36px;height:36px;border-radius:10px;overflow:hidden;margin:0 auto 6px;border:2px solid var(--border)}
  .team-avatar img{width:100%;height:100%;object-fit:cover}
  .team-name{font-size:11px;font-weight:700}
  .team-role{font-size:9px;color:var(--t3)}
  .team-status{width:6px;height:6px;border-radius:50%;margin:4px auto 0}

  /* Cmd Center */
  .cmd-section{animation:cardReveal 0.5s var(--eo) 0.45s both;margin-bottom:16px}
  .cmd-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .cmd-card{padding:16px}
  .cmd-title{font-size:12px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .cmd-title svg{width:14px;height:14px;color:var(--purple)}
  .activity-item{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px}
  .activity-item:last-child{border:none}
  .activity-dot{width:6px;height:6px;border-radius:50%;margin-top:5px;flex-shrink:0}
  .activity-text{color:var(--t2);line-height:1.4}
  .activity-text b{color:var(--t1)}
  .activity-time{margin-left:auto;font-size:9px;color:var(--t3);font-family:var(--m);flex-shrink:0}

  /* Chat panel */
  .chat-section{animation:slideRight 0.5s var(--eo) 0.5s both;margin-bottom:16px}
  .chat-card{padding:16px}
  .chat-title{font-size:12px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .chat-title svg{width:14px;height:14px;color:var(--cyan)}
  .msg{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
  .msg:last-child{border:none}
  .msg-av{width:24px;height:24px;border-radius:6px;overflow:hidden;flex-shrink:0}
  .msg-av img{width:100%;height:100%;object-fit:cover}
  .msg-name{font-size:10px;font-weight:700}
  .msg-role-tag{font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px}
  .msg-time{font-size:8px;color:var(--t3);font-family:var(--m);margin-left:auto}
  .msg-text{font-size:11px;color:var(--t2);line-height:1.4;margin-top:2px}
  .msg-text b{color:var(--t1)}
</style>
</head>

const TEAM=[
  {n:'Sarah Chen',r:'CFO',img:'https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=60&h=60&fit=crop&crop=face',on:1},
  {n:'James Rodriguez',r:'FP&A',img:'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=60&h=60&fit=crop&crop=face',on:1},
  {n:'Priya Patel',r:'Controller',img:'https://images.unsplash.com/photo-1580489944761-15a19d654956?w=60&h=60&fit=crop&crop=face',on:1},
  {n:'David Kim',r:'RevOps',img:'https://images.unsplash.com/photo-1560250097-0b93528c311a?w=60&h=60&fit=crop&crop=face',on:0},
];

const MSGS=[
  {n:'Priya Patel',rl:'Controller',rc:'var(--gm)',rt:'var(--green)',t:'9:12 AM',tx:'AP accruals reconciled. <b>$42K variance</b> traced to NetSuite timing — adjusted.',img:'https://images.unsplash.com/photo-1580489944761-15a19d654956?w=60&h=60&fit=crop&crop=face'},
  {n:'James Rodriguez',rl:'FP&A',rc:'var(--cm)',rt:'var(--cyan)',t:'9:08 AM',tx:'Q2 forecast updated. Runway extended <b>+2.4 months</b>.',img:'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=60&h=60&fit=crop&crop=face'},
  {n:'David Kim',rl:'RevOps',rc:'var(--am)',rt:'var(--amber)',t:'8:55 AM',tx:'March pipeline closed at <b>$1.8M</b>.',img:'https://images.unsplash.com/photo-1560250097-0b93528c311a?w=60&h=60&fit=crop&crop=face'},
];

const ACTIVITY=[
  {c:'var(--green)',tx:'<b>Revenue recognition</b> completed by Sarah C.',t:'9:14'},
  {c:'var(--cyan)',tx:'<b>AP accruals</b> reconciliation started by Priya P.',t:'9:10'},
  {c:'var(--purple)',tx:'AI Copilot reclassified <b>$67K OPEX</b> to prepaid',t:'9:05'},
  {c:'var(--amber)',tx:'David K. updated pipeline to <b>$1.8M closed</b>',t:'8:55'},
];

function go(tier){
  ['starter','growth','business'].forEach(t=>{
    const b=document.getElementById('btn-'+t);
    b.className='tier-btn';
    b.style.background='';
  });
  const btn=document.getElementById('btn-'+tier);
  btn.classList.add('on');
  btn.style.background=T[tier].color;
  render(tier);
}

function bars(color,n){return Array.from({length:n||12},()=>`<div class="chart-bar" style="height:${25+Math.random()*70}%;background:${color};opacity:${0.3+Math.random()*0.7}"></div>`).join('')}

function render(tier){
  const t=T[tier];

  // Banner
  document.getElementById('tierBanner').innerHTML=`
    <div class="tier-badge" style="background:${t.bg};color:${t.color}">${t.label} — ${t.price}</div>
    <div><div class="tier-desc">${t.desc}</div>
    <div class="tier-features">${t.features.map(f=>`<div class="tier-feat"><svg viewBox="0 0 24 24" fill="none" stroke="${t.color}" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>${f}</div>`).join('')}</div></div>`;

  // Sidebar — only show what this tier has
  document.getElementById('sidebar').innerHTML=`
    <div class="sb-label">Your Dashboard</div>
    ${t.nav.map(n=>`<div class="sb-item${n.a?' active':''}">${ICO[n.l]||''} ${n.l}</div>`).join('')}`;

  // Main content — only what this tier gets
  let h='';

  // KPIs
  h+=`<div class="kpi-grid" style="grid-template-columns:repeat(${t.kpiCols},1fr)">${t.kpis.map((k,i)=>`
    <div class="kpi glass" style="animation-delay:${i*0.05}s">
      <div class="kpi-label"><div class="kpi-dot" style="background:${k.c}"></div>${k.label}</div>
      <div class="kpi-val">${k.val}</div>
      <div class="kpi-change ${k.up?'up':'down'}"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="${k.up?'18 15 12 9 6 15':'6 9 12 15 18 9'}"/></svg>${k.ch}</div>
    </div>`).join('')}</div>`;

  // Charts
  h+=`<div class="charts-row" style="grid-template-columns:${t.chartCols}">
    ${t.charts.map(c=>`<div class="chart glass"><div class="chart-title">${c.t} <div class="chart-live"><div style="width:4px;height:4px;border-radius:50%;background:var(--green);animation:pulse 2s infinite"></div>Live</div></div><div class="chart-area">${bars(c.c)}</div></div>`).join('')}
  </div>`;

  // Table
  h+=`<div class="data-table glass"><div class="data-table-title">${t.table.t}</div>
    <table><thead><tr>${t.table.h.map(x=>`<th>${x}</th>`).join('')}</tr></thead>
    <tbody>${t.table.r.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;

  // Extras — only shown for tiers that have them
  if(t.extras.includes('ai')){
    h+=`<div class="ai-strip" style="grid-template-columns:repeat(3,1fr)">
      <div class="ai-card glass"><div class="ai-header"><div class="ai-icon"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div><div class="ai-label">Variance Alert</div></div><div class="ai-text"><b>Marketing OPEX</b> $67K over — Salesforce renewal. Auto-reclassified.</div></div>
      <div class="ai-card glass"><div class="ai-header"><div class="ai-icon"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg></div><div class="ai-label">Forecast</div></div><div class="ai-text">Revenue <b>7.7% above</b> Q1 forecast. Board deck updated.</div></div>
      <div class="ai-card glass"><div class="ai-header"><div class="ai-icon"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div class="ai-label">Runway</div></div><div class="ai-text">Cash runway <b>18.2mo</b> (+2.4mo) after headcount update.</div></div>
    </div>`;
  }

  if(t.extras.includes('team')){
    h+=`<div class="team-strip" style="grid-template-columns:repeat(4,1fr)">
      ${TEAM.map(m=>`<div class="team-card glass"><div class="team-avatar"><img src="${m.img}"/></div><div class="team-name">${m.n.split(' ')[0]} ${m.n.split(' ')[1][0]}.</div><div class="team-role">${m.r}</div><div class="team-status" style="background:${m.on?'var(--green)':'var(--amber)'}"></div></div>`).join('')}
    </div>`;
  }

  if(t.extras.includes('cmd')){
    h+=`<div class="cmd-section"><div class="cmd-grid">
      <div class="cmd-card glass"><div class="cmd-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Activity Feed</div>
        ${ACTIVITY.map(a=>`<div class="activity-item"><div class="activity-dot" style="background:${a.c}"></div><div class="activity-text">${a.tx}</div><div class="activity-time">${a.t}</div></div>`).join('')}
      </div>
      <div class="cmd-card glass"><div class="cmd-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> Audit Trail</div>
        <div class="activity-item"><div class="activity-dot" style="background:var(--green)"></div><div class="activity-text">SOX control test <b>passed</b> — revenue recognition</div><div class="activity-time">8:45</div></div>
        <div class="activity-item"><div class="activity-dot" style="background:var(--green)"></div><div class="activity-text">Auto-recon matched <b>12 of 14</b> accounts</div><div class="activity-time">8:30</div></div>
        <div class="activity-item"><div class="activity-dot" style="background:var(--cyan)"></div><div class="activity-text">Journal entry <b>JE-0342</b> posted by Priya P.</div><div class="activity-time">8:22</div></div>
        <div class="activity-item"><div class="activity-dot" style="background:var(--amber)"></div><div class="activity-text">Investor metrics refreshed — <b>Series C score: 87</b></div><div class="activity-time">8:15</div></div>
      </div>
    </div></div>`;
  }

  if(t.extras.includes('chat')){
    h+=`<div class="chat-section"><div class="chat-card glass"><div class="chat-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg> Team Chat — # general</div>
      ${MSGS.map(m=>`<div class="msg"><div class="msg-av"><img src="${m.img}"/></div><div style="flex:1"><div style="display:flex;align-items:center;gap:5px"><div class="msg-name">${m.n}</div><div class="msg-role-tag" style="background:${m.rc};color:${m.rt}">${m.rl}</div><div class="msg-time">${m.t}</div></div><div class="msg-text">${m.tx}</div></div></div>`).join('')}
    </div></div>`;
  }

  document.getElementById('main').innerHTML=h;
}

render('starter');
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/site/auth-guard.js"></script>
</body>
</html>
