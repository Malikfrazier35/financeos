<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Castford Dashboard</title>
  <link rel="icon" type="image/png" href="/site/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    // Derive role from pathname (no query string needed):
    //   /ceo → ceo, /controller → controller, /fpa → fpa, /treasurer → treasurer
    (function() {
      var path = window.location.pathname.replace(/^\/+/, '').split('/')[0];
      window.__castfordRole = path || 'ceo';
      var titles = {
        ceo: 'Founder',
        cfo: 'CFO Hub',
        controller: 'Controller',
        fpa: 'FP&A',
        treasurer: 'Treasurer'
      };
      document.title = 'Castford — ' + (titles[window.__castfordRole] || 'Dashboard');
    })();
  </script>
</head>
<body>
  <script>
    // Set body data attribute for engine to read
    document.body.dataset.role = window.__castfordRole || 'ceo';
  </script>

  <main id="eng-page">
    <div style="text-align:center;padding:80px 20px;color:#64748b;font-family:'Instrument Sans',-apple-system,sans-serif;font-size:13px">
      <div style="opacity:0.6">Loading dashboard…</div>
    </div>
  </main>

  <!-- Supabase UMD for auth-guard + engine token retrieval -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/site/auth-guard.js"></script>
  <script src="/site/dashboard-engine.js?v=2"></script>
</body>
</html>
