<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Castford - Standard Dashboard</title>
  <style>
    @property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
    @property --glow-x { syntax: '<percentage>'; initial-value: 50%; inherits: false; }
    @property --glow-y { syntax: '<percentage>'; initial-value: 50%; inherits: false; }

    :root {
      --bg: #f8f9fb;
      --bg-elevated: #ffffff;
      --bg-card: #ffffff;
      --bg-inset: #f1f3f7;
      --bg-sidebar: #fafbfc;
      --border: #e5e7ec;
      --border-subtle: #eef0f4;
      --text: #0f1729;
      --text-secondary: #3b4559;
      --text-muted: #6b7a94;
      --text-faint: #9ca7b8;
      --indigo: #2563EB;
      --indigo-dark: #1E40AF;
      --purple: #7C3AED;
      --green: #10B981;
      --red: #EF4444;
      --amber: #F59E0B;
      --blue: #3B82F6;
      --cyan: #06B6D4;
      --font-display: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      --font-mono: 'Menlo', 'Monaco', 'Courier New', monospace;
      --shadow-xs: 0 1px 2px rgba(0,0,0,0.04);
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.03);
      --shadow-lg: 0 12px 24px rgba(0,0,0,0.07), 0 4px 8px rgba(0,0,0,0.04);
      --shadow-xl: 0 20px 40px rgba(0,0,0,0.08);
      --shadow-card: 0 1px 4px rgba(0,0,0,0.05), 0 0 0 1px rgba(0,0,0,0.03);
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 12px;
      --spacing-lg: 16px;
      --spacing-xl: 24px;
      --spacing-2xl: 32px;
      --spacing-3xl: 48px;
      --r: 10px;
      --r-sm: 6px;
      --r-md: 12px;
      --r-lg: 16px;
      --r-xl: 20px;
      --sidebar-w: 248px;
    }

    * { box-sizing: border-box; }
    html { font-size: 16px; }
    body {
      font-family: var(--font-body);
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      display: flex;
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    input, button, textarea, select {
      font-family: inherit;
      font-size: inherit;
      color: inherit;
    }

    button {
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
    }

    /* CARDS */
    .card {
      background-color: var(--bg-card);
      border-radius: var(--r-md);
      padding: var(--spacing-lg);
      box-shadow: var(--shadow-card);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--blue), var(--purple));
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .card:hover {
      box-shadow: var(--shadow-md);
      border-color: rgba(37, 99, 235, 0.12);
      transform: translateY(-2px);
    }

    .card:hover::before {
      opacity: 1;
    }

    .card-fade {
      opacity: 0;
      transform: scale(0.96) translateY(20px);
      filter: blur(3px);
    }

    .card-fade.visible {
      opacity: 1;
      transform: scale(1) translateY(0);
      filter: blur(0);
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .card-glow {
      border-color: var(--indigo) !important;
      box-shadow: 0 0 16px rgba(37, 99, 235, 0.12), var(--shadow-card);
      animation: glow 2s ease-in-out infinite;
    }

    .card-accent {
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.04) 0%, rgba(124, 58, 237, 0.04) 100%);
      border: 1px solid rgba(37, 99, 235, 0.1);
    }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
      padding: var(--spacing-md) var(--spacing-lg);
      border-radius: var(--r);
      font-size: 0.875rem;
      font-weight: 600;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .btn-indigo {
      background: linear-gradient(135deg, var(--indigo) 0%, var(--purple) 100%);
      color: #fff;
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.25);
    }

    .btn-indigo:hover {
      box-shadow: 0 4px 16px rgba(37, 99, 235, 0.35);
      transform: translateY(-2px);
    }

    .btn-outline {
      border: 1px solid var(--border);
      color: var(--text-secondary);
      background: var(--bg-card);
    }

    .btn-outline:hover {
      background-color: var(--bg-inset);
      border-color: rgba(37, 99, 235, 0.2);
      color: var(--indigo);
    }

    .btn-ghost {
      color: var(--text-muted);
    }

    .btn-ghost:hover {
      color: var(--text);
      background-color: var(--bg-inset);
    }

    .btn-sm { padding: var(--spacing-sm) var(--spacing-md); font-size: 0.8125rem; }
    .btn-xs { padding: var(--spacing-xs) var(--spacing-sm); font-size: 0.75rem; }

    /* AVATAR */
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: #fff;
      overflow: hidden;
      background: linear-gradient(135deg, var(--blue), var(--indigo));
    }

    .avatar-ring {
      position: relative;
    }

    .avatar-ring::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      border: 2px solid rgba(37, 99, 235, 0.2);
    }

    /* TAGS */
    .tag {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-xs);
      padding: var(--spacing-xs) var(--spacing-sm);
      background-color: var(--bg-inset);
      border-radius: var(--r-sm);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
      border: 1px solid var(--border-subtle);
    }

    .tag-sm { padding: 2px 6px; font-size: 0.7rem; }

    .badge {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .live-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: breathe 2s ease-in-out infinite;
    }

    /* METRIC BAR */
    .metric-bar {
      width: 100%;
      height: 5px;
      background-color: var(--bg-inset);
      border-radius: 3px;
      overflow: hidden;
      margin-top: var(--spacing-xs);
    }

    .metric-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--indigo), var(--purple));
      border-radius: 3px;
      transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .msg-bubble {
      background-color: var(--bg-inset);
      border-radius: var(--r);
      padding: var(--spacing-md) var(--spacing-lg);
      word-wrap: break-word;
      border: 1px solid var(--border-subtle);
    }

    /* KEYFRAMES */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes breathe {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 16px rgba(37, 99, 235, 0.1), var(--shadow-card); }
      50% { box-shadow: 0 0 24px rgba(37, 99, 235, 0.18), var(--shadow-card); }
    }

    @keyframes spin { to { --angle: 360deg; } }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @keyframes countUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes barGrow {
      from { transform: scaleX(0); }
      to { transform: scaleX(1); }
    }

    /* SIDEBAR */
    .sidebar {
      width: var(--sidebar-w);
      background-color: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: var(--spacing-lg);
      position: relative;
    }

    .sidebar::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 1px;
      background: linear-gradient(180deg, rgba(37,99,235,0.08), transparent 30%, transparent 70%, rgba(124,58,237,0.08));
    }

    .sidebar-header {
      font-size: 0.6875rem;
      font-weight: 700;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: var(--spacing-md);
      margin-top: var(--spacing-xl);
    }

    .sidebar-header:first-child { margin-top: 0; }

    .sidebar-link {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      padding: var(--spacing-md) var(--spacing-lg);
      color: var(--text-muted);
      text-decoration: none;
      border-radius: var(--r);
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.2s ease;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
    }

    .sidebar-link:hover {
      color: var(--text);
      background-color: var(--bg-inset);
    }

    .sidebar-link.active {
      color: var(--indigo);
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.08) 0%, rgba(124, 58, 237, 0.05) 100%);
      border: 1px solid rgba(37, 99, 235, 0.12);
      font-weight: 600;
    }

    /* MAIN LAYOUT */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background-color: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
      padding: var(--spacing-lg) var(--spacing-2xl);
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(20px);
    }

    .header-title {
      font-size: 1.375rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: var(--spacing-2xl);
      scroll-behavior: smooth;
    }

    /* SCROLL PROGRESS */
    .scroll-progress {
      position: fixed;
      top: 0;
      left: var(--sidebar-w);
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--blue), var(--purple), var(--green));
      transform-origin: left;
      transform: scaleX(0);
      z-index: 100;
      transition: transform 0.1s linear;
    }

    /* HERO */
    .hero {
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.06) 0%, rgba(124, 58, 237, 0.04) 50%, rgba(16, 185, 129, 0.03) 100%);
      border: 1px solid rgba(37, 99, 235, 0.1);
      border-radius: var(--r-xl);
      padding: var(--spacing-2xl) var(--spacing-3xl);
      margin-bottom: var(--spacing-2xl);
      display: flex;
      align-items: center;
      justify-content: space-between;
      animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -50%; right: -10%;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(37,99,235,0.06) 0%, transparent 70%);
      border-radius: 50%;
      animation: float 6s ease-in-out infinite;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: -30%; left: 20%;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(124,58,237,0.05) 0%, transparent 70%);
      border-radius: 50%;
      animation: float 8s ease-in-out infinite reverse;
    }

    .hero-content { position: relative; z-index: 1; }

    .hero-content h1 {
      margin: 0 0 var(--spacing-sm) 0;
      font-size: 1.875rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.03em;
    }

    .hero-content p {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.9375rem;
      line-height: 1.5;
    }

    .hero-badges {
      display: flex;
      gap: var(--spacing-sm);
      margin-top: var(--spacing-lg);
    }

    .badge-tag {
      background: rgba(37, 99, 235, 0.06);
      border: 1px solid rgba(37, 99, 235, 0.12);
      color: var(--indigo);
      padding: var(--spacing-xs) var(--spacing-md);
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      backdrop-filter: blur(8px);
    }

    /* KPI GRID */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: var(--spacing-lg);
      margin-bottom: var(--spacing-2xl);
      perspective: 800px;
    }

    .kpi-card {
      background-color: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: var(--spacing-xl);
      position: relative;
      overflow: hidden;
      transform-style: preserve-3d;
      will-change: transform;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      opacity: 0;
      transform: translateY(20px);
    }

    .kpi-card.visible {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--blue), var(--purple));
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .kpi-card:hover::before { opacity: 1; }

    .kpi-card:hover {
      box-shadow: var(--shadow-lg);
      border-color: rgba(37, 99, 235, 0.15);
    }

    .kpi-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: var(--spacing-md);
      font-weight: 600;
    }

    .kpi-value {
      font-size: 1.875rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: var(--spacing-xs);
      letter-spacing: -0.03em;
    }

    .kpi-trend {
      display: flex;
      align-items: center;
      gap: var(--spacing-xs);
      font-size: 0.8125rem;
      font-weight: 600;
    }

    .trend-up { color: var(--green); }
    .trend-down { color: var(--red); }

    /* GRIDS */
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: var(--spacing-lg);
      margin-bottom: var(--spacing-2xl);
      perspective: 800px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: var(--spacing-lg);
      margin-bottom: var(--spacing-2xl);
      perspective: 800px;
    }

    .section-title {
      font-size: 1.0625rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: var(--spacing-lg);
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      letter-spacing: -0.01em;
    }

    .section-title::before {
      content: '';
      width: 4px;
      height: 20px;
      background: linear-gradient(180deg, var(--indigo), var(--purple));
      border-radius: 2px;
    }

    /* TABLE */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: var(--spacing-lg);
    }

    th {
      text-align: left;
      padding: var(--spacing-md);
      border-bottom: 2px solid var(--border);
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    td {
      padding: var(--spacing-md);
      border-bottom: 1px solid var(--border-subtle);
      font-size: 0.875rem;
    }

    tr { transition: background-color 0.15s ease; }
    tr:hover { background-color: rgba(37, 99, 235, 0.02); }

    /* FOOTER BANNER */
    .footer-banner {
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.05) 0%, rgba(124, 58, 237, 0.04) 100%);
      border: 1px solid rgba(37, 99, 235, 0.1);
      border-radius: var(--r-xl);
      padding: var(--spacing-2xl) var(--spacing-3xl);
      margin-top: var(--spacing-2xl);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .footer-banner::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: var(--r-xl);
      background: conic-gradient(from var(--angle), var(--blue), var(--purple), var(--green), var(--amber), var(--blue));
      z-index: -1;
      animation: spin 4s linear infinite;
      opacity: 0.06;
    }

    .footer-banner h3 {
      margin: 0 0 var(--spacing-sm) 0;
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--text);
    }

    .footer-banner p {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.875rem;
      max-width: 400px;
    }

    .footer-action { display: flex; gap: var(--spacing-sm); }

    /* UTILITIES */
    .color-red { color: var(--red); }
    .color-green { color: var(--green); }
    .color-amber { color: var(--amber); }
    .color-blue { color: var(--blue); }
    .color-purple { color: var(--purple); }
    .color-cyan { color: var(--cyan); }

    .bg-red { background-color: var(--red); }
    .bg-green { background-color: var(--green); }
    .bg-amber { background-color: var(--amber); }
    .bg-blue { background-color: var(--blue); }
    .bg-purple { background-color: var(--purple); }
    .bg-cyan { background-color: var(--cyan); }

    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .gap-sm { gap: var(--spacing-sm); }
    .gap-md { gap: var(--spacing-md); }
    .gap-lg { gap: var(--spacing-lg); }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .mt-lg { margin-top: var(--spacing-lg); }
    .mb-lg { margin-bottom: var(--spacing-lg); }
    .text-sm { font-size: 0.875rem; }
    .text-xs { font-size: 0.75rem; }
    .text-muted { color: var(--text-muted); }
    .text-secondary { color: var(--text-secondary); }
    .font-semibold { font-weight: 600; }
    .font-bold { font-weight: 700; }

    /* FROSTED GLASS CARDS */
    .glass-card {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: var(--r-md);
      padding: var(--spacing-lg);
    }

    /* COMPLIANCE ICON CARD */
    .compliance-icon-card {
      text-align: center;
      background: var(--bg-inset);
      border-radius: var(--r-md);
      padding: var(--spacing-xl);
      border: 1px solid var(--border-subtle);
      transition: all 0.3s ease;
    }

    .compliance-icon-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
      background: var(--bg-card);
    }

    /* SECURITY EVENT ROW */
    .security-event {
      padding: var(--spacing-lg);
      background: var(--bg-inset);
      border-radius: var(--r);
      margin-bottom: var(--spacing-md);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid var(--border-subtle);
      transition: all 0.2s ease;
    }

    .security-event:hover {
      background: var(--bg-card);
      border-color: var(--border);
      box-shadow: var(--shadow-sm);
    }

    /* AMBIENT ORB */
    .ambient-orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(80px);
      opacity: 0.5;
    }

    /* MAGNETIC BUTTON */
    .magnetic-btn {
      transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* SCROLLBAR */
    .content::-webkit-scrollbar { width: 6px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .content::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* FUTURE-PROOFING */
    @supports (animation-timeline: scroll()) {
      .scroll-progress {
        animation: scaleX linear;
        animation-timeline: scroll(nearest block);
        transform: scaleX(var(--scroll));
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;

            <div class="card card-fade" data-delay="${i * 100}">
              <div style="font-size: 3rem; margin-bottom: var(--spacing-md); animation: float ${3 + i}s ease-in-out infinite;">${seg.emoji}</div>
              <h3 style="margin: 0 0 var(--spacing-lg) 0; font-size: 1.125rem; font-weight: 700; color: var(--text);">${seg.name}</h3>
              <div style="background: var(--bg-inset); border-radius: var(--r); padding: var(--spacing-lg); border: 1px solid var(--border-subtle);">
                <div style="display: flex; justify-content: space-between; margin-bottom: var(--spacing-md);">
                  <span class="text-xs text-muted">Annual Revenue</span>
                  <span class="font-bold" style="font-size: 1.125rem; color: var(--text);">${seg.revenue}</span>
                </div>
                <div style="margin-bottom: var(--spacing-lg);">
                  <div style="display: flex; justify-content: space-between; margin-bottom: var(--spacing-sm);">
                    <span class="text-xs text-muted">% of Total</span>
                    <span class="font-semibold" style="color: var(--text);">${seg.percentage}%</span>
                  </div>
                  <div class="metric-bar">
                    <div class="metric-fill" style="width: ${seg.percentage}%;"></div>
                  </div>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: var(--spacing-md);">
                  <span class="text-xs text-muted">YoY Growth</span>
                  <span style="font-weight: 700; color: ${seg.growth.startsWith('+') ? 'var(--green)' : 'var(--red)'};">${seg.growth}</span>
                </div>
                <div style="display: flex; justify-content: space-between;">
                  <span class="text-xs text-muted">Op. Margin</span>
                  <span class="font-semibold" style="color: var(--text);">${seg.margin}%</span>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderAIFlows() {
      return `
        <h1 class="header-title" style="margin-bottom: var(--spacing-xl);">AI Automation Flows</h1>
        <div class="grid-2">
          <div class="card" style="margin-bottom: var(--spacing-2xl); grid-column: 1 / -1;">
            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--spacing-lg);">
              <div>
                <div class="kpi-label">Active Flows</div>
                <div class="kpi-value" style="font-size: 2rem; color: var(--text);">3</div>
              </div>
              <div>
                <div class="kpi-label">Models</div>
                <div class="kpi-value" style="font-size: 2rem; color: var(--text);">1</div>
              </div>
              <div>
                <div class="kpi-label">Avg Confidence</div>
                <div class="kpi-value" style="font-size: 2rem; color: var(--text);">91%</div>
              </div>
              <div>
                <div class="kpi-label">Data Points/hr</div>
                <div class="kpi-value" style="font-size: 2rem; color: var(--text);">1.2K</div>
              </div>
            </div>
          </div>

          ${aiFlows.map((flow, i) => `
            <div class="card card-fade" data-delay="${i * 100}">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-lg);">
                <div>
                  <h3 style="margin: 0 0 var(--spacing-xs) 0; font-size: 0.95rem; font-weight: 700; color: var(--text);">${flow.name}</h3>
                  <p style="margin: 0; color: var(--text-muted); font-size: 0.875rem;">${flow.description}</p>
                </div>
                <span class="live-dot" style="background-color: var(--green); margin-left: var(--spacing-lg);"></span>
              </div>
              <div style="background: var(--bg-inset); border-radius: var(--r); padding: var(--spacing-md); margin-bottom: var(--spacing-lg); border: 1px solid var(--border-subtle);">
                <div style="display: flex; justify-content: space-between; margin-bottom: var(--spacing-sm);">
                  <span class="text-xs text-muted">Model</span>
                  <span class="text-sm font-semibold" style="color: var(--text);">${flow.model}</span>
                </div>
                <div style="display: flex; justify-content: space-between;">
                  <span class="text-xs text-muted">Assigned</span>
                  <span class="text-sm font-semibold" style="color: var(--text);">${flow.assigned}</span>
                </div>
              </div>
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-sm);">
                <span class="text-xs text-muted">Confidence Score</span>
                <span style="color: var(--green); font-weight: 700;">${flow.confidence}%</span>
              </div>
              <div class="metric-bar">
                <div class="metric-fill" style="width: ${flow.confidence}%;"></div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderSecurity() {
      return `
        <h1 class="header-title" style="margin-bottom: var(--spacing-xl);">Security & Compliance</h1>
        <div class="card" style="margin-bottom: var(--spacing-2xl);">
          <h2 class="section-title">Compliance Status</h2>
          <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--spacing-lg); margin-bottom: var(--spacing-2xl);">
            <div class="compliance-icon-card">
              <div style="font-size: 2rem; margin-bottom: var(--spacing-md);">🔐</div>
              <div class="kpi-label">SOC 2 Type II</div>
              <div style="color: var(--green); font-weight: 700; margin-top: var(--spacing-sm);">Compliant</div>
            </div>
            <div class="compliance-icon-card">
              <div style="font-size: 2rem; margin-bottom: var(--spacing-md);">🔒</div>
              <div class="kpi-label">Data Encryption</div>
              <div style="color: var(--blue); font-weight: 700; margin-top: var(--spacing-sm);">AES-256</div>
            </div>
            <div class="compliance-icon-card">
              <div style="font-size: 2rem; margin-bottom: var(--spacing-md);">👥</div>
              <div class="kpi-label">Row-Level Security</div>
              <div style="color: var(--cyan); font-weight: 700; margin-top: var(--spacing-sm);">Enforced</div>
            </div>
            <div class="compliance-icon-card">
              <div style="font-size: 2rem; margin-bottom: var(--spacing-md);">🛡️</div>
              <div class="kpi-label">Security Headers</div>
              <div style="color: var(--purple); font-weight: 700; margin-top: var(--spacing-sm);">Configured</div>
            </div>
          </div>

          <h2 class="section-title">Security Activity Log</h2>
          ${securityEvents.map(event => `
            <div class="security-event">
              <div style="flex: 1;">
                <p style="margin: 0 0 var(--spacing-xs) 0; color: var(--text-secondary);">${event.description}</p>
                <span class="text-xs text-muted">by ${event.user}</span>
              </div>
              <div style="display: flex; align-items: center; gap: var(--spacing-lg);">
                <span class="text-xs text-muted">${event.time}</span>
                <span class="badge" style="background-color: ${event.severity === 'success' ? 'var(--green)' : event.severity === 'warning' ? 'var(--amber)' : 'var(--blue)'}; width: 10px; height: 10px;"></span>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderContent(view) {
      const content = document.getElementById('content');
      switch(view) {
        case 'Overview': content.innerHTML = renderOverview(); break;
        case 'Tasks': content.innerHTML = renderTasks(); break;
        case 'Messages': content.innerHTML = renderMessages(); break;
        case 'Team': content.innerHTML = renderTeam(); break;
        case 'Segments': content.innerHTML = renderSegments(); break;
        case 'AI Flows': content.innerHTML = renderAIFlows(); break;
        case 'Security': content.innerHTML = renderSecurity(); break;
        default: content.innerHTML = renderOverview();
      }
      initAnimations();
    }

    function renderSidebar() {
      const sidebar = document.getElementById('sidebar');
      const roles = ['CFO', 'VP Finance', 'Controller', 'FP&A Manager'];
      const statusColor = { online: 'var(--green)', away: 'var(--amber)', offline: 'var(--text-faint)' };
      const userObj = users.find(u => u.role === currentUser.role) || users[0];

      sidebar.innerHTML = `
        <div style="margin-bottom: var(--spacing-2xl);">
          <div style="display: flex; align-items: center; gap: var(--spacing-md); margin-bottom: var(--spacing-lg);">
            <div style="position: relative;">
              <div class="avatar" style="width: 44px; height: 44px; font-size: 1rem; background: ${userObj.gradient};">${currentUser.photo}</div>
              <span style="position: absolute; bottom: 0; right: 0; width: 10px; height: 10px; border-radius: 50%; background: ${statusColor[currentUser.status]}; border: 2px solid var(--bg-sidebar); animation: breathe 2s ease-in-out infinite;"></span>
            </div>
            <div>
              <div class="font-semibold" style="font-size: 0.875rem; color: var(--text);">${currentUser.name}</div>
              <div class="text-xs text-muted">${currentUser.role}</div>
            </div>
          </div>
        </div>

        <div class="sidebar-header">Navigation</div>
        <button class="sidebar-link active" onclick="switchTab('Overview')">📊 Overview</button>
        <button class="sidebar-link" onclick="switchTab('Tasks')">✅ Tasks</button>
        <button class="sidebar-link" onclick="switchTab('Messages')">💬 Messages</button>
        <button class="sidebar-link" onclick="switchTab('Team')">👥 Team</button>
        <button class="sidebar-link" onclick="switchTab('Segments')">📈 Segments</button>
        <button class="sidebar-link" onclick="switchTab('AI Flows')">🤖 AI Flows</button>
        <button class="sidebar-link" onclick="switchTab('Security')">🔐 Security</button>

        <div class="sidebar-header">Roles</div>
        ${roles.map(role => `
          <button class="sidebar-link" onclick="switchRole('${role}')" style="${role === currentUser.role ? 'color: var(--indigo); font-weight: 600;' : ''}">${role}</button>
        `).join('')}

        <div style="margin-top: auto; padding-top: var(--spacing-2xl); border-top: 1px solid var(--border);">
          <button class="btn btn-outline" style="width: 100%; justify-content: center;">Sign Out</button>
        </div>
      `;
    }

    function switchTab(view) {
      document.querySelectorAll('.sidebar-link').forEach(link => link.classList.remove('active'));
      if (event && event.target) {
        const btn = event.target.closest('.sidebar-link');
        if (btn) btn.classList.add('active');
      }
      renderContent(view);
    }

    function switchRole(role) {
      const user = users.find(u => u.role === role);
      if (user) {
        currentUser.name = user.name;
        currentUser.role = role;
        currentUser.photo = user.photo;
        renderSidebar();
        renderContent('Overview');
      }
    }

    // ANIMATION ENGINE
    function initAnimations() {
      // Staggered card entrance
      document.querySelectorAll('.card-fade').forEach((card, i) => {
        const delay = parseInt(card.dataset.delay) || i * 80;
        setTimeout(() => card.classList.add('visible'), delay + 100);
      });

      // KPI card staggered entrance
      document.querySelectorAll('.kpi-card').forEach((card, i) => {
        setTimeout(() => card.classList.add('visible'), i * 70 + 150);
      });

      // KPI counter animations
      document.querySelectorAll('.kpi-value[data-target]').forEach((el, i) => {
        const target = parseFloat(el.dataset.target);
        const prefix = el.dataset.prefix || '';
        const suffix = el.dataset.suffix || '';
        const isDecimal = String(target).includes('.');
        const duration = 1200;
        const startTime = performance.now() + i * 100 + 300;

        function animate(now) {
          const elapsed = now - startTime;
          if (elapsed < 0) { requestAnimationFrame(animate); return; }
          const progress = Math.min(elapsed / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          const current = target * eased;
          el.textContent = prefix + (isDecimal ? current.toFixed(1) : Math.round(current)) + suffix;
          if (progress < 1) requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
      });

      // Metric bar fill animation
      document.querySelectorAll('.metric-fill[data-width]').forEach((fill, i) => {
        setTimeout(() => { fill.style.width = fill.dataset.width; }, 500 + i * 100);
      });

      // 3D tilt on cards
      document.querySelectorAll('.kpi-card, .grid-3 .card, .grid-2 .card').forEach(card => {
        card.addEventListener('mousemove', e => {
          const rect = card.getBoundingClientRect();
          const x = (e.clientX - rect.left) / rect.width - 0.5;
          const y = (e.clientY - rect.top) / rect.height - 0.5;
          card.style.transform = `perspective(800px) rotateY(${x * 5}deg) rotateX(${-y * 5}deg) translateY(-2px)`;
        });
        card.addEventListener('mouseleave', () => {
          card.style.transform = 'perspective(800px) rotateY(0) rotateX(0) translateY(0)';
        });
      });

      // Magnetic buttons
      document.querySelectorAll('.magnetic-btn').forEach(btn => {
        btn.addEventListener('mousemove', e => {
          const rect = btn.getBoundingClientRect();
          const cx = rect.left + rect.width / 2;
          const cy = rect.top + rect.height / 2;
          const dx = (e.clientX - cx) * 0.1;
          const dy = (e.clientY - cy) * 0.1;
          btn.style.transform = `translate(${dx}px, ${dy}px)`;
        });
        btn.addEventListener('mouseleave', () => {
          btn.style.transform = 'translate(0, 0)';
        });
      });

      // Scroll progress
      const contentEl = document.getElementById('content');
      const progressBar = document.getElementById('scrollProgress');
      if (contentEl && progressBar) {
        contentEl.addEventListener('scroll', () => {
          const scrollTop = contentEl.scrollTop;
          const scrollHeight = contentEl.scrollHeight - contentEl.clientHeight;
          const progress = scrollHeight > 0 ? scrollTop / scrollHeight : 0;
          progressBar.style.transform = `scaleX(${progress})`;
        });
      }
    }

    // Initialize
    renderSidebar();
    renderContent('Overview');
  </script>
</body>
</html>
