<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FinanceOS — Design Studio + Customizer (Production Preview)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f3f4f8;--surface:#ffffff;--card:#ffffff;--elevated:#eef0f5;
  --border:#e2e5ed;--border2:#cdd2de;
  --t1:#0a0d15;--t2:#3a4259;--t3:#576175;--t4:#8792a8;
  --accent:#3b82f6;--accent-dim:rgba(59,130,246,0.07);
  --green:#10b981;--green-dim:rgba(16,185,129,0.07);
  --red:#ef4444;--red-dim:rgba(239,68,68,0.07);
  --amber:#f59e0b;--amber-dim:rgba(245,158,11,0.07);
  --purple:#8b5cf6;--purple-dim:rgba(139,92,246,0.07);
  --cyan:#06b6d4;--cyan-dim:rgba(6,182,212,0.07);
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,0.06);
  --shadow-md:0 4px 16px rgba(0,0,0,0.06);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.08);
  --ease:cubic-bezier(0.4,0,.2,1);
  --font:'DM Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;min-height:100vh;font-size:14px;overflow-x:hidden;}

/* ═══ TOP BAR ═══ */
.topbar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:12px;}
.topbar-logo{display:flex;align-items:center;gap:8px;padding-right:16px;border-right:1px solid var(--border);}
.topbar-logo svg{width:32px;height:32px;}
.topbar-logo .name{font-size:16px;font-weight:800;letter-spacing:-0.02em;}
.plan-badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:0.04em;}

/* Role + Tier controls */
.topbar-controls{display:flex;align-items:center;gap:6px;margin-left:auto;}
.role-btn{padding:5px 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--t3);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:5px;}
.role-btn:hover{border-color:var(--border2);color:var(--t2);}
.role-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.role-btn .rdot{width:6px;height:6px;border-radius:50%;}
.tier-btn{padding:5px 12px;border-radius:20px;font-size:10px;font-weight:700;border:1px solid;cursor:pointer;transition:all 0.15s;text-transform:uppercase;letter-spacing:0.03em;}
.tier-btn.active{box-shadow:0 0 0 2px currentColor,0 0 8px currentColor;}
.tier-starter{color:var(--cyan);border-color:rgba(6,182,212,0.2);background:var(--cyan-dim);}
.tier-growth{color:var(--green);border-color:rgba(16,185,129,0.2);background:var(--green-dim);}
.tier-business{color:var(--purple);border-color:rgba(139,92,246,0.2);background:var(--purple-dim);}

/* ═══ LAYOUT ═══ */
.layout{display:flex;min-height:calc(100vh - 52px);}

/* Sidebar */
.sidebar{width:200px;border-right:1px solid var(--border);background:var(--surface);padding:16px 0;flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto;}
.sb-section{padding:0 12px;margin-bottom:14px;}
.sb-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--t4);margin-bottom:6px;padding:0 8px;}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;transition:all 0.12s;margin-bottom:1px;}
.sb-item:hover{background:var(--elevated);color:var(--t1);}
.sb-item.active{background:rgba(59,130,246,0.08);color:var(--accent);font-weight:600;}
.sb-item svg{width:14px;height:14px;flex-shrink:0;opacity:0.5;}
.sb-item.active svg{opacity:1;}
.sb-item .tier-lock{font-size:7px;font-weight:800;padding:1px 5px;border-radius:3px;margin-left:auto;text-transform:uppercase;letter-spacing:0.03em;display:flex;align-items:center;gap:2px;}
.sb-item .cnt{font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;margin-left:auto;}

/* Main */
.main{flex:1;padding:20px 24px;min-width:0;overflow-y:auto;}

/* ═══ TIER BANNER ═══ */
.tier-banner{display:flex;align-items:center;gap:14px;padding:12px 18px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);margin-bottom:18px;}
.tier-banner .badge{font-size:10px;font-weight:800;padding:4px 12px;border-radius:6px;text-transform:uppercase;letter-spacing:0.04em;}
.tier-banner .info{flex:1;}
.tier-banner .info h3{font-size:13px;font-weight:700;}
.tier-banner .info p{font-size:11px;color:var(--t4);}
.tier-banner .features{display:flex;gap:12px;font-size:11px;color:var(--t3);}
.tier-banner .features span::before{content:'✓ ';color:var(--green);font-weight:700;}

/* ═══ DASHBOARD HEADER ═══ */
.dash-header h1{font-size:22px;font-weight:800;letter-spacing:-0.02em;}
.dash-header .sub{font-size:12px;color:var(--t3);display:flex;align-items:center;gap:6px;margin-top:2px;}
.dash-header .sub .live{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s ease infinite;}
@keyframes pulse{0%,100%{opacity:0.5;}50%{opacity:1;}}

/* ═══ KPI CARDS ═══ */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;transition:all 0.2s;}
.kpi:hover{box-shadow:var(--shadow-md);border-color:var(--border2);}
.kpi .icon{font-size:14px;margin-bottom:2px;}
.kpi .label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;color:var(--t4);margin-bottom:6px;}
.kpi .value{font-size:26px;font-weight:800;font-family:var(--mono);letter-spacing:-0.02em;}
.kpi .change{font-size:11px;font-weight:600;margin-top:3px;}
.kpi .change.up{color:var(--green);}
.kpi .change.down{color:var(--red);}

/* ═══ CHARTS ═══ */
.charts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;}
.chart-card h3{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.chart-card h3 .live-tag{font-size:9px;font-weight:700;color:var(--green);display:flex;align-items:center;gap:3px;}
.chart-card h3 .live-tag::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--green);}
.bar-chart{display:flex;align-items:flex-end;gap:3px;height:120px;}
.bar{flex:1;border-radius:3px 3px 0 0;transition:height 0.5s var(--ease);min-width:5px;}

/* ═══ TABLE ═══ */
.data-table{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;}
.dt-head{display:grid;padding:10px 18px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--t4);border-bottom:1px solid var(--border);background:var(--elevated);}
.dt-row{display:grid;padding:10px 18px;font-size:13px;border-bottom:1px solid var(--border);transition:background 0.1s;}
.dt-row:last-child{border:none;}
.dt-row:hover{background:var(--elevated);}
.status{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.03em;}
.s-done{color:var(--green);}
.s-progress{color:var(--cyan);}
.s-pending{color:var(--amber);}

/* ═══ AI INSIGHTS ═══ */
.ai-section h3{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.ai-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.ai-card{padding:14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card);}
.ai-card .tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:4px;display:flex;align-items:center;gap:4px;}
.ai-card p{font-size:11px;color:var(--t2);line-height:1.5;}
.ai-card strong{color:var(--t1);}

/* ═══ LOCK OVERLAY ═══ */
.lock-wrap{position:relative;border-radius:var(--radius);overflow:hidden;margin-bottom:16px;}
.lock-blur{filter:blur(4px);opacity:0.35;pointer-events:none;}
.lock-gate{position:absolute;inset:0;background:rgba(248,250,252,0.8);backdrop-filter:blur(4px);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5;border-radius:inherit;}
.lock-gate .icon{width:44px;height:44px;border-radius:12px;background:var(--elevated);display:flex;align-items:center;justify-content:center;margin-bottom:10px;font-size:18px;}
.lock-gate .title{font-size:14px;font-weight:700;margin-bottom:3px;}
.lock-gate .sub{font-size:11px;color:var(--t3);margin-bottom:10px;}
.lock-gate .upgrade-btn{padding:8px 20px;border-radius:var(--radius-sm);font-size:12px;font-weight:700;border:none;color:#fff;cursor:pointer;transition:all 0.2s;}
.lock-gate .upgrade-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-md);}

/* ═══ TEAM SECTION ═══ */
.team-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.team-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;text-align:center;transition:all 0.15s;}
.team-card:hover{box-shadow:var(--shadow-md);}
.team-card .avatar{width:36px;height:36px;border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.team-card .name{font-size:12px;font-weight:700;}
.team-card .role{font-size:10px;color:var(--t4);}

/* ═══ CUSTOMIZE BAR (floating) ═══ */
.cbar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:200;background:rgba(15,23,42,0.94);backdrop-filter:blur(24px) saturate(1.5);border-radius:14px;padding:8px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 40px rgba(0,0,0,0.2),0 0 0 1px rgba(255,255,255,0.05);color:#fff;animation:slideUp 0.5s var(--ease);}
@keyframes slideUp{from{transform:translateX(-50%) translateY(30px);opacity:0;}to{transform:translateX(-50%) translateY(0);opacity:1;}}
.cbar-icon{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#06B6D4,#8B5CF6);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;}
.cbar-title{font-size:12px;font-weight:700;white-space:nowrap;}
.cbar-sep{width:1px;height:22px;background:rgba(255,255,255,0.08);}
.cbar-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:rgba(255,255,255,0.3);white-space:nowrap;}
.cbar-swatch{width:18px;height:18px;border-radius:5px;border:2px solid transparent;cursor:pointer;transition:all 0.12s;}
.cbar-swatch:hover,.cbar-swatch.active{border-color:rgba(255,255,255,0.8);transform:scale(1.15);}
.cbar-btn{padding:5px 10px;border-radius:6px;font-size:10px;font-weight:600;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.6);cursor:pointer;transition:all 0.12s;white-space:nowrap;}
.cbar-btn:hover{background:rgba(255,255,255,0.1);color:#fff;}
.cbar-btn.active{background:rgba(6,182,212,0.2);border-color:rgba(6,182,212,0.4);color:#67E8F9;}
.cbar-studio{padding:6px 14px;border-radius:8px;font-size:11px;font-weight:700;border:none;background:linear-gradient(135deg,#06B6D4,#8B5CF6);color:#fff;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:5px;}
.cbar-studio:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(6,182,212,0.3);}

/* ═══ DESIGN STUDIO MODAL ═══ */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,0.45);backdrop-filter:blur(6px);z-index:300;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:18px;width:92%;max-width:920px;max-height:88vh;overflow:hidden;box-shadow:var(--shadow-lg);animation:modalIn 0.3s var(--ease);}
@keyframes modalIn{from{transform:translateY(14px) scale(0.97);opacity:0;}to{transform:none;opacity:1;}}
.modal-head{padding:22px 26px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;}
.modal-head h2{font-size:20px;font-weight:800;letter-spacing:-0.02em;}
.modal-head p{font-size:12px;color:var(--t3);margin-top:3px;}
.modal-close{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:18px;transition:all 0.12s;}
.modal-close:hover{background:var(--elevated);color:var(--t1);}
.modal-body{padding:22px 26px 26px;overflow-y:auto;max-height:calc(88vh - 75px);}

/* Studio categories */
.studio-cats{display:flex;gap:6px;margin-bottom:18px;}
.studio-cat{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--t3);cursor:pointer;transition:all 0.15s;}
.studio-cat:hover{border-color:var(--border2);color:var(--t2);}
.studio-cat.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* Studio grid */
.studio-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.studio-card{border-radius:14px;border:2px solid var(--border);overflow:hidden;cursor:pointer;transition:all 0.3s var(--ease);position:relative;}
.studio-card:hover{border-color:var(--cyan);transform:translateY(-4px);box-shadow:var(--shadow-lg);}
.studio-card.selected{border-color:var(--cyan);}
.studio-card.selected .check{display:flex;}
.check{display:none;position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;background:var(--cyan);color:#fff;font-size:12px;font-weight:700;align-items:center;justify-content:center;z-index:5;box-shadow:0 2px 8px rgba(6,182,212,0.3);}

/* Mini preview in studio card */
.studio-preview{height:150px;position:relative;overflow:hidden;}
.sp-sidebar{position:absolute;left:0;top:0;bottom:0;width:32px;border-right:1px solid;display:flex;flex-direction:column;align-items:center;padding-top:8px;gap:5px;}
.sp-logo{width:18px;height:18px;border-radius:5px;margin-bottom:4px;}
.sp-dot{width:5px;height:5px;border-radius:2px;opacity:0.25;}
.sp-dot.active{opacity:1;width:14px;}
.sp-topbar{position:absolute;top:0;left:32px;right:0;height:24px;border-bottom:1px solid;display:flex;align-items:center;padding:0 8px;font-size:7px;font-weight:700;}
.sp-content{position:absolute;top:24px;left:32px;right:0;bottom:0;padding:6px;}
.sp-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-bottom:5px;}
.sp-kpi{border-radius:4px;border:1px solid;padding:4px 3px;text-align:center;}
.sp-kpi-val{font-size:9px;font-weight:800;}
.sp-kpi-lbl{font-size:4px;text-transform:uppercase;letter-spacing:0.05em;}
.sp-chart{border-radius:4px;border:1px solid;display:flex;align-items:flex-end;gap:1px;padding:4px;height:55px;}
.sp-bar{flex:1;border-radius:2px 2px 0 0;transition:height 0.5s;}
.studio-card:hover .sp-bar{animation:barPop 0.6s var(--ease);}
@keyframes barPop{0%{transform:scaleY(0.4);}100%{transform:scaleY(1);}}
.sp-status{position:absolute;bottom:0;left:32px;right:0;height:14px;border-top:1px solid;display:flex;align-items:center;padding:0 6px;font-size:5px;gap:6px;}
.sp-live{width:3px;height:3px;border-radius:50%;animation:pulse 2s ease infinite;}

/* Card info */
.studio-info{padding:12px 14px;}
.studio-info .tags{display:flex;gap:4px;margin-bottom:5px;}
.studio-tag{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;padding:2px 7px;border-radius:4px;}
.studio-info h4{font-size:14px;font-weight:700;letter-spacing:-0.01em;margin-bottom:2px;}
.studio-info p{font-size:11px;color:var(--t3);line-height:1.4;}
.studio-info .feats{display:flex;gap:8px;margin-top:6px;font-size:10px;color:var(--t4);}
.studio-info .feats span::before{content:'· ';}

/* Apply bar */
.modal-footer{padding:14px 26px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--elevated);}
.modal-footer .info{font-size:12px;color:var(--t3);}
.modal-footer .info strong{color:var(--t1);}
.apply-btn{padding:10px 28px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;border:none;background:linear-gradient(135deg,var(--cyan),var(--purple));color:#fff;cursor:pointer;transition:all 0.2s;}
.apply-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(6,182,212,0.3);}

/* Bottom spacer */
.bottom-space{height:70px;}

/* ═══ RESPONSIVE ═══ */
@media(max-width:900px){.sidebar{width:60px;}.sb-label,.sb-item span:not(.cnt):not(.tier-lock){display:none;}.kpis{grid-template-columns:repeat(2,1fr);}.studio-grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-logo">
    <svg viewBox="0 0 32 32" fill="none"><defs><linearGradient id="lg" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#3B82F6"/><stop offset="1" stop-color="#8B5CF6"/></linearGradient></defs><rect width="32" height="32" rx="8" fill="url(#lg)"/><path d="M8 12h16M8 16h12M8 20h8" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
    <span class="name">FinanceOS</span>
    <span class="plan-badge" id="planBadge" style="background:var(--green-dim);color:var(--green);">GROWTH</span>
  </div>

  <div class="topbar-controls">
    <button class="role-btn active" data-role="cfo" onclick="setRole('cfo',this)"><span class="rdot" style="background:#3B82F6;"></span> CFO</button>
    <button class="role-btn" data-role="ceo" onclick="setRole('ceo',this)"><span class="rdot" style="background:#8B5CF6;"></span> CEO</button>
    <button class="role-btn" data-role="controller" onclick="setRole('controller',this)"><span class="rdot" style="background:#10B981;"></span> Controller</button>
    <span style="width:1px;height:24px;background:var(--border);margin:0 4px;"></span>
    <button class="tier-btn tier-starter" data-tier="starter" onclick="setTier('starter',this)">Starter</button>
    <button class="tier-btn tier-growth active" data-tier="growth" onclick="setTier('growth',this)">Growth</button>
    <button class="tier-btn tier-business" data-tier="business" onclick="setTier('business',this)">Business</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main"></div>
</div>

<!-- Customize Bar -->
<div class="cbar">
  <div class="cbar-icon">✦</div>
  <span class="cbar-title">Customize</span>
  <div class="cbar-sep"></div>
  <span class="cbar-lbl">Theme</span>
  <div class="cbar-swatch active" style="background:linear-gradient(135deg,#F3F4F8,#E2E8F0);" onclick="pickTheme('light',this)" title="Arctic Light"></div>
  <div class="cbar-swatch" style="background:linear-gradient(135deg,#030711,#0C1323);" onclick="pickTheme('midnight',this)" title="Midnight"></div>
  <div class="cbar-swatch" style="background:linear-gradient(135deg,#FFFBF5,#F5E6D3);" onclick="pickTheme('warm',this)" title="Warm Sand"></div>
  <div class="cbar-swatch" style="background:linear-gradient(135deg,#040D0A,#0D3320);" onclick="pickTheme('forest',this)" title="Forest"></div>
  <div class="cbar-swatch" style="background:linear-gradient(135deg,#0C0A1A,#1A1040);" onclick="pickTheme('executive',this)" title="Executive"></div>
  <div class="cbar-swatch" style="background:linear-gradient(135deg,#0a0a0a,#111);" onclick="pickTheme('terminal',this)" title="Terminal"></div>
  <div class="cbar-sep"></div>
  <span class="cbar-lbl">Layout</span>
  <button class="cbar-btn active" onclick="pickLayout('grid',this)">Grid</button>
  <button class="cbar-btn" onclick="pickLayout('compact',this)">Compact</button>
  <div class="cbar-sep"></div>
  <button class="cbar-studio" onclick="openStudio()">✦ Design Studio</button>
</div>

<!-- Design Studio Modal -->
<div class="modal-overlay" id="studioModal" onclick="if(event.target===this)closeStudio()">
  <div class="modal">
    <div class="modal-head">
      <div>
        <h2>Design Studio</h2>
        <p id="studioSub">Pre-styled command centers and boards. Switch anytime.</p>

function isLocked(item){
  const T=TIERS[tier];
  return T.lockGrowth.some(l=>item.toLowerCase().includes(l.toLowerCase().split(' ')[0]))
      || T.lockBusiness.some(l=>item.toLowerCase().includes(l.toLowerCase().split(' ')[0]));
}
function lockTier(item){
  const T=TIERS[tier];
  if(T.lockGrowth.some(l=>item.toLowerCase().includes(l.toLowerCase().split(' ')[0]))) return 'growth';
  if(T.lockBusiness.some(l=>item.toLowerCase().includes(l.toLowerCase().split(' ')[0]))) return 'business';
  return null;
}

}

    <div class="studio-card${d.id===design?' selected':''}" onclick="selectDesign('${d.id}',this)">

          <div class="sp-dot active" style="background:${d.accent};"></div>
          <div class="sp-dot" style="background:${d.border};"></div>
          <div class="sp-dot" style="background:${d.border};"></div>
          <div class="sp-dot" style="background:${d.border};"></div>
        </div>
        <div class="sp-topbar" style="background:${d.topbar};border-color:${d.border};color:${d.text};">Command Center</div>
        <div class="sp-content" style="background:${d.bg};">
          <div class="sp-kpis">
            ${d.bars.slice(0,4).map((_,i)=>`<div class="sp-kpi" style="background:${d.kpi};border-color:${d.border};">
              <div class="sp-kpi-val" style="color:${d.text};">$${(4+i)}M</div>
              <div class="sp-kpi-lbl" style="color:${d.accent}80;">KPI</div>
            </div>`).join('')}
          </div>
          <div class="sp-chart" style="background:${d.kpi};border-color:${d.border};">
            ${d.bars.map(h=>`<div class="sp-bar" style="height:${h}%;background:${d.accent};opacity:0.5;"></div>`).join('')}
          </div>
        </div>
        <div class="sp-status" style="background:${d.bg};border-color:${d.border};color:${d.accent}80;">
          <div class="sp-live" style="background:${d.accent};box-shadow:0 0 4px ${d.accent};"></div>
          <span style="font-family:var(--mono);">LIVE</span>

function selectDesign(id,el){
  design=id;
  const d=DESIGNS.find(x=>x.id===id);
  document.querySelectorAll('.studio-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('selectedDesign').textContent=d.name;
  document.getElementById('studioSub').textContent=`Selected: ${d.name} — ${d.desc}`;
  // Update theme swatches
  document.querySelectorAll('.cbar-swatch').forEach(s=>s.classList.remove('active'));
}

function applyDesign(){
  closeStudio();
  // In production: POST /api/settings/theme with design ID, then refresh dashboard CSS vars
  const d=DESIGNS.find(x=>x.id===design);
  document.getElementById('studioSub').textContent=`Applied: ${d.name}`;
}
